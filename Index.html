// UTILS
// ─────────────────────────────────────────────
const fmt = (n) => `R ${Number(n||0).toLocaleString('en-ZA',{minimumFractionDigits:0,maximumFractionDigits:0})}`;
const fmtDate = (s) => s ? new Date(s).toLocaleDateString('en-ZA',{day:'2-digit',month:'short',year:'numeric'}) : '—';
const fmtMonth = (s) => { if(!s) return '—'; const [y,m]=s.split('-'); return new Date(y,m-1).toLocaleString('en',{month:'short',year:'2-digit'}); };

function calcDeal(deal) {
  const sp = Number(deal.salePrice)||0;
  const cp = Number(deal.commissionPct)||5;
  const as = Number(deal.agencySplitPct)||50;
  const total   = sp * (cp/100);
  const agency  = total * (as/100);
  const agent   = total - agency;
  return { total, agency, agent,
    meComm:   deal.assignedTo==='me'   ? agent : 0,
    wifeComm: deal.assignedTo==='wife' ? agent : 0,
  };
}

  const display = fmtFn ? fmtFn(current) : current;

  dateOfferAccepted:'',dateRegistered:'',status:'Lead',assignedTo:'me',
  agentName:AGENT_ME,commissionPct:5,agencySplitPct:50,notes:'',
};

function DealForm({deal,onSave,onClose}) {
  const [f,setF] = useState(deal||EMPTY_DEAL);
  const set = (k,v) => setF(p=>({...p,[k]:v}));
  const calc = useMemo(()=>calcDeal(f),[f]);

  return (
    <form onSubmit={e=>{e.preventDefault();onSave({...f,id:deal?.id||Date.now()});}}>
      <div style={fd}>
        <label style={lbl}>Property Address *</label>
        <input style={inp} value={f.propertyAddress} onChange={e=>set('propertyAddress',e.target.value)} required placeholder="12 Example Street, Suburb, City"/>
      </div>
      <div style={g2}>
        <div style={fd}><label style={lbl}>Seller Name</label><input style={inp} value={f.sellerName} onChange={e=>set('sellerName',e.target.value)}/></div>
        <div style={fd}><label style={lbl}>Buyer Name</label><input style={inp} value={f.buyerName} onChange={e=>set('buyerName',e.target.value)}/></div>
        <div style={fd}><label style={lbl}>Listing Price (R)</label><input style={inp} type="number" value={f.listingPrice} onChange={e=>set('listingPrice',e.target.value)}/></div>
        <div style={fd}><label style={lbl}>Sale Price (R)</label><input style={inp} type="number" value={f.salePrice} onChange={e=>set('salePrice',e.target.value)}/></div>
        <div style={fd}><label style={lbl}>Date Offer Accepted</label><input style={inp} type="date" value={f.dateOfferAccepted} onChange={e=>set('dateOfferAccepted',e.target.value)}/></div>
        <div style={fd}><label style={lbl}>Date Registered</label><input style={inp} type="date" value={f.dateRegistered} onChange={e=>set('dateRegistered',e.target.value)}/></div>
        <div style={fd}>
          <label style={lbl}>Deal Status</label>
          <select style={inp} value={f.status} onChange={e=>set('status',e.target.value)}>
            {DEAL_STATUSES.map(s=><option key={s}>{s}</option>)}
          </select>
        </div>
        <div style={fd}>
          <label style={lbl}>Assigned To</label>
          <select style={inp} value={f.assignedTo} onChange={e=>{set('assignedTo',e.target.value);set('agentName',e.target.value==='me'?AGENT_ME:AGENT_WIFE);}}>
            <option value="me">{AGENT_ME}</option>
            <option value="wife">{AGENT_WIFE}</option>
          </select>
        </div>
        <div style={fd}><label style={lbl}>Commission % (of sale price)</label><input style={inp} type="number" step="0.1" min="0" max="20" value={f.commissionPct} onChange={e=>set('commissionPct',parseFloat(e.target.value)||0)}/></div>
        <div style={fd}><label style={lbl}>Agency Split % (E&amp;V keeps)</label><input style={inp} type="number" step="1" min="0" max="100" value={f.agencySplitPct} onChange={e=>set('agencySplitPct',parseFloat(e.target.value)||0)}/></div>
      </div>

      {Number(f.salePrice)>0 && (
        <div style={{background:C.bg,borderRadius:11,padding:16,marginBottom:18,border:`1px solid ${C.border}`}}>
          <div style={{fontSize:11,fontWeight:800,textTransform:'uppercase',letterSpacing:1.2,color:C.gold,marginBottom:10}}>Live Commission Preview</div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:12}}>
            <div><div style={{fontSize:11,color:C.muted,marginBottom:3}}>Total Commission</div><div style={{fontWeight:800,fontSize:15}}>{fmt(calc.total)}</div></div>
            <div><div style={{fontSize:11,color:C.muted,marginBottom:3}}>E&amp;V Agency Share</div><div style={{fontWeight:700,fontSize:15,color:C.muted}}>{fmt(calc.agency)}</div></div>
            <div><div style={{fontSize:11,color:C.muted,marginBottom:3}}>Your Gross Commission</div><div style={{fontWeight:800,fontSize:15,color:C.gold}}>{fmt(calc.agent)}</div></div>
          </div>
          <div style={{marginTop:10,fontSize:12,color:C.muted}}>
            Allocated to <strong>{f.assignedTo==='me'?AGENT_ME:AGENT_WIFE}</strong>
          </div>
        </div>
      )}

      <div style={fd}><label style={lbl}>Notes</label><textarea style={{...inp,minHeight:76,resize:'vertical'}} value={f.notes} onChange={e=>set('notes',e.target.value)}/></div>

      <div style={{display:'flex',gap:12,justifyContent:'flex-end',paddingTop:6}}>
        <button type="button" onClick={onClose} style={{padding:'10px 22px',borderRadius:9,border:`1px solid ${C.border}`,background:'none',cursor:'pointer',fontSize:13,fontWeight:700,color:C.dark}}>Cancel</button>
        <button type="submit" style={{padding:'10px 26px',borderRadius:9,border:'none',background:C.dark,color:'#fff',cursor:'pointer',fontSize:13,fontWeight:800}}>Save Deal</button>
      </div>
    </form>
  );

// ─────────────────────────────────────────────
// DASHBOARD
// ─────────────────────────────────────────────
function Dashboard({deals,pipeline}) {
  const now = new Date();
  const thisMonthKey = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  const thisYearKey  = String(now.getFullYear());

  const soldDeals    = deals.filter(d=>['Sold','Registered','Paid'].includes(d.status)&&Number(d.salePrice)>0);
  const paidDeals    = deals.filter(d=>d.status==='Paid'&&Number(d.salePrice)>0);
  const pendingDeals = deals.filter(d=>['Sold','Registered'].includes(d.status)&&Number(d.salePrice)>0);

  const totalComm   = soldDeals.reduce((s,d)=>s+calcDeal(d).agent,0);
  const paidComm    = paidDeals.reduce((s,d)=>s+calcDeal(d).agent,0);
  const pendingComm = pendingDeals.reduce((s,d)=>s+calcDeal(d).agent,0);

  const moDeals = soldDeals.filter(d=>(d.dateOfferAccepted||'').startsWith(thisMonthKey));
  const yrDeals = soldDeals.filter(d=>(d.dateOfferAccepted||'').startsWith(thisYearKey));
  const moComm  = moDeals.reduce((s,d)=>s+calcDeal(d).agent,0);
  const yrComm  = yrDeals.reduce((s,d)=>s+calcDeal(d).agent,0);
  const avgPrice= soldDeals.length>0 ? soldDeals.reduce((s,d)=>s+Number(d.salePrice),0)/soldDeals.length : 0;

  // Last 6 months chart
  const barData = [];
  for(let i=5;i>=0;i--) {
    const d   = new Date(now.getFullYear(),now.getMonth()-i,1);
    const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    const mon = d.toLocaleString('en',{month:'short'});
    const comm= soldDeals.filter(x=>(x.dateOfferAccepted||'').startsWith(key)).reduce((s,x)=>s+calcDeal(x).agent,0);
    barData.push({mon,comm:Math.round(comm/1000)});
  }

  // Status pie
  const statusPie = DEAL_STATUSES.map(s=>({name:s,value:deals.filter(d=>d.status===s).length})).filter(x=>x.value>0);

  return (
    <div>
      <div style={{marginBottom:26}}>
        <h1 style={{fontSize:25,fontWeight:800,color:C.dark,letterSpacing:-.5}}>Dashboard</h1>
        <p style={{color:C.muted,fontSize:13,marginTop:4}}>Welcome back, {AGENT_ME}. Here's your performance snapshot.</p>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(190px,1fr))',gap:14,marginBottom:22}} className="grid-3">
        <StatCard label="This Month Commission" value={fmt(moComm)}    sub={`${moDeals.length} deal${moDeals.length!==1?'s':''} accepted`} icon="trending"/>
        <StatCard label="This Year Commission"  value={fmt(yrComm)}    sub={`${yrDeals.length} deals accepted`}   icon="target"/>
        <StatCard label="Commission Paid"       value={fmt(paidComm)}  sub={`${paidDeals.length} deals paid`}     icon="home"/>
        <StatCard label="Commission Pending"    value={fmt(pendingComm)}sub={`${pendingDeals.length} pending`}    icon="deals"/>
        <StatCard label="Houses Sold"           value={soldDeals.length} sub="all time"                          icon="home"/>
        <StatCard label="Avg Selling Price"     value={fmt(avgPrice)}  sub="across all sold deals"               icon="trending"/>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginBottom:22}} className="grid-2">
        <Card>
          <h3 style={{fontSize:13,fontWeight:800,marginBottom:18,color:C.dark,letterSpacing:.2}}>Monthly Targets</h3>
          <ProgressRow label="Commission" current={moComm} target={TARGETS.monthlyComm} fmt={fmt}/>
          <ProgressRow label="Deals"      current={moDeals.length} target={TARGETS.monthlyDeals}/>
        </Card>
        <Card>
          <h3 style={{fontSize:13,fontWeight:800,marginBottom:18,color:C.dark,letterSpacing:.2}}>Yearly Targets</h3>
          <ProgressRow label="Commission" current={yrComm} target={TARGETS.yearlyComm} fmt={fmt}/>
          <ProgressRow label="Deals"      current={yrDeals.length} target={TARGETS.yearlyDeals}/>
        </Card>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'2fr 1fr',gap:16}} className="grid-2">
        <Card>
          <h3 style={{fontSize:13,fontWeight:800,marginBottom:18,color:C.dark}}>Commission Trend — Last 6 Months (R'000)</h3>
          <ResponsiveContainer width="100%" height={220}>
            <BarChart data={barData}>
              <CartesianGrid strokeDasharray="3 3" stroke={C.border}/>
              <XAxis dataKey="mon" tick={{fontSize:12,fill:C.muted}}/>
              <YAxis tick={{fontSize:12,fill:C.muted}}/>
              <Tooltip formatter={v=>[`R ${v}k`,'Commission']} contentStyle={{borderRadius:9,border:`1px solid ${C.border}`,fontSize:12}}/>
              <Bar dataKey="comm" fill={C.gold} radius={[5,5,0,0]}/>
            </BarChart>
          </ResponsiveContainer>
        </Card>
        <Card>
          <h3 style={{fontSize:13,fontWeight:800,marginBottom:14,color:C.dark}}>Deals by Status</h3>
          <ResponsiveContainer width="100%" height={190}>
            <PieChart>
              <Pie data={statusPie} dataKey="value" cx="50%" cy="50%" outerRadius={72} innerRadius={32}>
                {statusPie.map((e,i)=><Cell key={i} fill={STATUS_COLOR[e.name]}/>)}
              </Pie>
              <Tooltip contentStyle={{borderRadius:9,border:`1px solid ${C.border}`,fontSize:12}}/>
            </PieChart>
          </ResponsiveContainer>
          <div style={{display:'flex',flexWrap:'wrap',gap:8,marginTop:6}}>
            {statusPie.map(s=>(
              <div key={s.name} style={{display:'flex',alignItems:'center',gap:5,fontSize:11}}>
                <div style={{width:8,height:8,borderRadius:'50%',background:STATUS_COLOR[s.name],flexShrink:0}}/>
                <span style={{color:C.muted}}>{s.name} ({s.value})</span>
              </div>
            ))}
          </div>
        </Card>
      </div>
    </div>
  );
}

  );
}

          <div style={fd}>
            <label style={lbl}>Sale Price (R)</label>
            <input style={{...inp,fontSize:18,fontWeight:700}} type="number" value={sp} onChange={e=>setSp(e.target.value)} placeholder="5000000"/>
          </div>

          <div style={fd}>
            <label style={lbl}>Commission Rate: <strong style={{color:C.gold}}>{cp}%</strong></label>
            <input type="range" style={{width:'100%',accentColor:C.gold,marginBottom:4}} min="1" max="10" step="0.5" value={cp} onChange={e=>setCp(e.target.value)}/>
            <div style={{display:'flex',justifyContent:'space-between',fontSize:10,color:C.muted}}><span>1%</span><span>10%</span></div>
          </div>

          <div style={fd}>
            <label style={lbl}>E&amp;V Agency keeps: <strong style={{color:C.gold}}>{as}%</strong> · You keep: <strong style={{color:C.gold}}>{pct}%</strong></label>
            <input type="range" style={{width:'100%',accentColor:C.gold,marginBottom:4}} min="0" max="100" step="5" value={as} onChange={e=>setAs(e.target.value)}/>
            <div style={{display:'flex',justifyContent:'space-between',fontSize:10,color:C.muted}}><span>0%</span><span>100%</span></div>
          </div>

          <div>
            <label style={lbl}>Assign Deal To</label>
            <div style={{display:'flex',gap:10}}>
              {[['me',AGENT_ME],['wife',AGENT_WIFE]].map(([v,label])=>(
                <button key={v} type="button" onClick={()=>setWho(v)} style={{flex:1,padding:'11px',borderRadius:9,fontWeight:800,fontSize:14,cursor:'pointer',
                  border:who===v?`2px solid ${C.gold}`:`1px solid ${C.border}`,
                  background:who===v?C.goldLt:'#fff',color:who===v?C.dark:C.muted}}>
                  {label}
                </button>
              ))}
            </div>
          </div>
        </Card>

        <Card>
          <h3 style={{fontWeight:800,marginBottom:22,fontSize:15}}>Breakdown</h3>
          <div style={{display:'flex',flexDirection:'column',gap:12}}>
            <Box label={`Total Commission (${cp}% of sale)`} val={fmt(total)} big/>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
              <Box label={`Agency / E&V (${as}%)`}   val={fmt(agency)}/>
              <Box label={`Agent Share (${pct}%)`}    val={fmt(agentSh)} gold/>
            </div>
            <Box label={`Allocated to ${who==='me'?AGENT_ME:AGENT_WIFE}`} val={fmt(agentSh)} big dark/>
            <div style={{fontSize:11,color:C.muted,textAlign:'center',lineHeight:1.7,padding:'6px 0',background:C.bg,borderRadius:9}}>
              <strong>Formula:</strong> {fmt(SP)} × {cp}% = {fmt(total)}<br/>
              × {pct}% agent share = <strong style={{color:C.gold}}>{fmt(agentSh)}</strong>
            </div>
          </div>
        </Card>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────
// INCOME REPORT
// ─────────────────────────────────────────────
function IncomeReport({deals}) {
  const [yr,setYr] = useState(new Date().getFullYear());

  const yrKey   = String(yr);
  const yrDeals = deals.filter(d=>(d.dateOfferAccepted||'').startsWith(yrKey)&&Number(d.salePrice)>0);
  const meDeals = yrDeals.filter(d=>d.assignedTo==='me');
  const wDeals  = yrDeals.filter(d=>d.assignedTo==='wife');
  const meInc   = meDeals.reduce((s,d)=>s+calcDeal(d).meComm,0);
  const wInc    = wDeals.reduce((s,d)=>s+calcDeal(d).wifeComm,0);
  const combo   = meInc+wInc;

  const moData = [];
  for(let m=1;m<=12;m++){
    const key=`${yr}-${String(m).padStart(2,'0')}`;
    const ml=new Date(yr,m-1).toLocaleString('en',{month:'short'});
    const mC=deals.filter(d=>d.assignedTo==='me'&&(d.dateOfferAccepted||'').startsWith(key)&&Number(d.salePrice)>0).reduce((s,d)=>s+calcDeal(d).meComm,0);
    const wC=deals.filter(d=>d.assignedTo==='wife'&&(d.dateOfferAccepted||'').startsWith(key)&&Number(d.salePrice)>0).reduce((s,d)=>s+calcDeal(d).wifeComm,0);
    moData.push({m:ml,[AGENT_ME]:Math.round(mC/1000),[AGENT_WIFE]:Math.round(wC/1000)});
  }

  const AgentCol=({name,agent,agentDeals,income})=>(
    <Card>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:18}}>
        <div>
          <div style={{fontSize:18,fontWeight:800,color:C.dark}}>{name}</div>
          <div style={{fontSize:12,color:C.muted,marginTop:2}}>{agentDeals.length} deals in {yr}</div>
        </div>
        <div style={{textAlign:'right'}}>
          <div style={{fontSize:26,fontWeight:800,color:C.gold}}>{fmt(income)}</div>
          <div style={{fontSize:10,color:C.muted,marginTop:1}}>gross commission</div>
        </div>
      </div>
      <div style={{borderTop:`1px solid ${C.border}`,paddingTop:14}}>
        {agentDeals.length===0
          ? <p style={{color:C.muted,fontSize:13}}>No deals in {yr}.</p>
          : agentDeals.map(d=>{
              const c=calcDeal(d);
              return (
                <div key={d.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 0',borderBottom:`1px solid ${C.border}`}}>
                  <div>
                    <div style={{fontSize:13,fontWeight:700,maxWidth:200,lineHeight:1.3}}>{d.propertyAddress}</div>
                    <div style={{fontSize:11,color:C.muted,marginTop:2}}>{fmtDate(d.dateOfferAccepted)}</div>
                  </div>
                  <div style={{textAlign:'right',flexShrink:0,marginLeft:12}}>
                    <div style={{fontWeight:800,color:C.gold}}>{fmt(agent==='me'?c.meComm:c.wifeComm)}</div>
                    <Badge status={d.status}/>
                  </div>
                </div>
              );
            })}
      </div>
    </Card>
  );

  return (
    <div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:22,flexWrap:'wrap',gap:12}}>
        <div>
          <h1 style={{fontSize:25,fontWeight:800,color:C.dark,letterSpacing:-.5}}>Income Report</h1>
          <p style={{color:C.muted,fontSize:13,marginTop:4}}>Household split — {AGENT_ME} &amp; {AGENT_WIFE}</p>
        </div>
        <select value={yr} onChange={e=>setYr(Number(e.target.value))} style={{...inp,width:'auto',fontSize:13}}>
          {[2024,2025,2026,2027].map(y=><option key={y}>{y}</option>)}
        </select>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(190px,1fr))',gap:14,marginBottom:22}} className="grid-3">
        <StatCard label={`${AGENT_ME}'s Income`}  value={fmt(meInc)}  sub={`${meDeals.length} deals`}   icon="income"/>
        <StatCard label={`${AGENT_WIFE}'s Income`} value={fmt(wInc)}   sub={`${wDeals.length} deals`}   icon="income"/>
        <StatCard label="Combined Household"       value={fmt(combo)}  sub={`${yrDeals.length} total`}   icon="trending"/>
        <StatCard label="Split Ratio"              value={combo>0?`${Math.round(meInc/combo*100)}/${Math.round(wInc/combo*100)}`:'N/A'} sub={`${AGENT_ME} / ${AGENT_WIFE}`} icon="target"/>
      </div>

      <Card style={{marginBottom:22}}>
        <h3 style={{fontSize:13,fontWeight:800,marginBottom:18}}>Monthly Comparison — R'000</h3>
        <ResponsiveContainer width="100%" height={260}>
          <BarChart data={moData}>
            <CartesianGrid strokeDasharray="3 3" stroke={C.border}/>
            <XAxis dataKey="m" tick={{fontSize:11,fill:C.muted}}/>
            <YAxis tick={{fontSize:11,fill:C.muted}}/>
            <Tooltip formatter={(v,n)=>[`R ${v}k`,n]} contentStyle={{borderRadius:9,border:`1px solid ${C.border}`,fontSize:12}}/>
            <Legend/>
            <Bar dataKey={AGENT_ME}   fill={C.dark} radius={[4,4,0,0]}/>
            <Bar dataKey={AGENT_WIFE} fill={C.gold} radius={[4,4,0,0]}/>
          </BarChart>
        </ResponsiveContainer>
      </Card>

      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:22}} className="grid-2">
        <AgentCol name={AGENT_ME}   agent="me"   agentDeals={meDeals} income={meInc}/>
        <AgentCol name={AGENT_WIFE} agent="wife" agentDeals={wDeals}  income={wInc}/>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────
// REPORTS
// ─────────────────────────────────────────────
function Reports({deals,pipeline}) {
  const [tab,setTab] = useState('monthly');

  const soldDeals    = deals.filter(d=>['Sold','Registered','Paid'].includes(d.status)&&Number(d.salePrice)>0);
  const paidDeals    = deals.filter(d=>d.status==='Paid'&&Number(d.salePrice)>0);
  const pendingDeals = deals.filter(d=>['Sold','Registered'].includes(d.status)&&Number(d.salePrice)>0);
  const totalComm    = soldDeals.reduce((s,d)=>s+calcDeal(d).agent,0);
  const paidComm     = paidDeals.reduce((s,d)=>s+calcDeal(d).agent,0);
  const pendComm     = pendingDeals.reduce((s,d)=>s+calcDeal(d).agent,0);
  const avgComm      = soldDeals.length>0?totalComm/soldDeals.length:0;
  const pipeW        = pipeline.reduce((s,p)=>s+Number(p.estimatedSalePrice||0)*p.probability/100,0);

  const now = new Date();
  const mo12 = [];
  for(let i=11;i>=0;i--){
    const d  = new Date(now.getFullYear(),now.getMonth()-i,1);
    const k  = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    const ml = d.toLocaleString('en',{month:'short',year:'2-digit'});
    const c  = soldDeals.filter(x=>(x.dateOfferAccepted||'').startsWith(k)).reduce((s,x)=>s+calcDeal(x).agent,0);
    const n  = soldDeals.filter(x=>(x.dateOfferAccepted||'').startsWith(k)).length;
    mo12.push({ml,comm:Math.round(c/1000),n});
  }

  // Area
  const areaMap={};
  soldDeals.forEach(d=>{
    const parts=d.propertyAddress.split(',');
    const area=parts.length>1?parts[parts.length-2].trim():parts[0].trim();
    if(!areaMap[area]) areaMap[area]={count:0,comm:0};
    areaMap[area].count++;
    areaMap[area].comm+=calcDeal(d).agent;
  });
  const areaData=Object.entries(areaMap).map(([a,v])=>({a,count:v.count,comm:Math.round(v.comm/1000)})).sort((x,y)=>y.comm-x.comm);

  const TABS=[{k:'monthly',l:'Monthly'},{k:'pipeline',l:'Pipeline'},{k:'area',l:'By Area'},{k:'summary',l:'Summary'}];

  return (
    <div>
      <div style={{marginBottom:22}}>
        <h1 style={{fontSize:25,fontWeight:800,color:C.dark,letterSpacing:-.5}}>Reports</h1>
        <p style={{color:C.muted,fontSize:13,marginTop:4}}>In-depth performance analysis.</p>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(175px,1fr))',gap:14,marginBottom:26}} className="grid-3">
        <StatCard label="Total Commission"   value={fmt(totalComm)} sub="all sold"                   icon="trending"/>
        <StatCard label="Commission Paid"    value={fmt(paidComm)}  sub={`${paidDeals.length} paid`} icon="home"/>
        <StatCard label="Pending"            value={fmt(pendComm)}  sub={`${pendingDeals.length} deals`} icon="deals"/>
        <StatCard label="Avg per Sale"       value={fmt(avgComm)}   sub="per deal"                   icon="calculator"/>
        <StatCard label="Pipeline (weighted)"value={fmt(pipeW)}     sub="by probability"             icon="pipeline"/>
        <StatCard label="Total Deals Sold"   value={soldDeals.length} sub="all time"                 icon="target"/>
      </div>

      <div style={{display:'flex',gap:4,marginBottom:20,background:C.bg,padding:4,borderRadius:10,border:`1px solid ${C.border}`,width:'fit-content',flexWrap:'wrap'}}>
        {TABS.map(t=>(
          <button key={t.k} onClick={()=>setTab(t.k)} style={{padding:'8px 18px',borderRadius:7,border:'none',cursor:'pointer',fontWeight:700,fontSize:13,
            background:tab===t.k?C.dark:'transparent',color:tab===t.k?'#fff':C.muted}}>
            {t.l}
          </button>
        ))}
      </div>

      {tab==='monthly' && (
        <Card>
          <h3 style={{fontWeight:800,marginBottom:20,fontSize:14}}>Monthly Commission — Last 12 Months (R'000)</h3>
          <ResponsiveContainer width="100%" height={300}>
            <BarChart data={mo12}>
              <CartesianGrid strokeDasharray="3 3" stroke={C.border}/>
              <XAxis dataKey="ml" tick={{fontSize:11,fill:C.muted}}/>
              <YAxis tick={{fontSize:11,fill:C.muted}}/>
              <Tooltip formatter={(v,n)=>[n==='comm'?`R ${v}k`:v,n==='comm'?'Commission':'Deals']} contentStyle={{borderRadius:9,border:`1px solid ${C.border}`,fontSize:12}}/>
              <Bar dataKey="comm" fill={C.gold} radius={[5,5,0,0]}/>
            </BarChart>
          </ResponsiveContainer>
        </Card>
      )}

      {tab==='pipeline' && (
        <Card>
          <h3 style={{fontWeight:800,marginBottom:20,fontSize:14}}>Pipeline Detail</h3>
          <div style={{overflowX:'auto'}}>
            <table style={{width:'100%',borderCollapse:'collapse',fontSize:13}}>
              <thead>
                <tr style={{background:C.bg}}>
                  {['Property','Source','Est. Price','Est. Commission','Probability','Weighted Value','Close'].map((h,i)=>(
                    <th key={i} style={{padding:'10px 14px',textAlign:'left',fontWeight:700,fontSize:10,textTransform:'uppercase',letterSpacing:.8,color:C.muted,borderBottom:`1px solid ${C.border}`,whiteSpace:'nowrap'}}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {pipeline.map((p,i)=>{
                  const ec=Number(p.estimatedSalePrice)*0.05*0.5;
                  const wv=Number(p.estimatedSalePrice)*p.probability/100;
                  return (
                    <tr key={p.id} style={{borderBottom:`1px solid ${C.border}`,background:i%2===0?'#fff':'#FAFAF8'}}>
                      <td style={{padding:'12px 14px',fontWeight:700,maxWidth:200}}>{p.propertyAddress}</td>
                      <td style={{padding:'12px 14px',color:C.muted}}>{p.leadSource}</td>
                      <td style={{padding:'12px 14px',fontWeight:700}}>{fmt(p.estimatedSalePrice)}</td>
                      <td style={{padding:'12px 14px',color:C.gold,fontWeight:800}}>{fmt(ec)}</td>
                      <td style={{padding:'12px 14px'}}><span style={{fontWeight:700}}>{p.probability}%</span></td>
                      <td style={{padding:'12px 14px',fontWeight:700}}>{fmt(wv)}</td>
                      <td style={{padding:'12px 14px',color:C.muted,whiteSpace:'nowrap'}}>{fmtMonth(p.expectedCloseMonth)}</td>
                    </tr>
                  );
                })}
                <tr style={{background:C.goldLt,fontWeight:800}}>
                  <td colSpan={5} style={{padding:'12px 14px',textAlign:'right'}}>Weighted Totals:</td>
                  <td style={{padding:'12px 14px',color:C.dark,fontWeight:800}}>{fmt(pipeW)}</td>
                  <td/>
                </tr>
              </tbody>
            </table>
          </div>
        </Card>
      )}

      {tab==='area' && (
        <Card>
          <h3 style={{fontWeight:800,marginBottom:20,fontSize:14}}>Sales &amp; Commission by Area (R'000)</h3>
          {areaData.length>0
            ? <>
                <ResponsiveContainer width="100%" height={260}>
                  <BarChart data={areaData} layout="vertical">
                    <CartesianGrid strokeDasharray="3 3" stroke={C.border}/>
                    <XAxis type="number" tick={{fontSize:11,fill:C.muted}}/>
                    <YAxis type="category" dataKey="a" tick={{fontSize:11,fill:C.muted}} width={130}/>
                    <Tooltip formatter={v=>[`R ${v}k`,'Commission']} contentStyle={{borderRadius:9,border:`1px solid ${C.border}`,fontSize:12}}/>
                    <Bar dataKey="comm" fill={C.dark} radius={[0,5,5,0]}/>
                  </BarChart>
                </ResponsiveContainer>
                <table style={{width:'100%',borderCollapse:'collapse',fontSize:13,marginTop:20}}>
                  <thead>
                    <tr style={{background:C.bg}}>
                      {['Area','Deals','Commission'].map((h,i)=><th key={i} style={{padding:'10px 14px',textAlign:'left',fontWeight:700,fontSize:10,textTransform:'uppercase',letterSpacing:.8,color:C.muted,borderBottom:`1px solid ${C.border}`}}>{h}</th>)}
                    </tr>
                  </thead>
                  <tbody>
                    {areaData.map((a,i)=>(
                      <tr key={a.a} style={{borderBottom:`1px solid ${C.border}`,background:i%2===0?'#fff':'#FAFAF8'}}>
                        <td style={{padding:'10px 14px',fontWeight:700}}>{a.a}</td>
                        <td style={{padding:'10px 14px'}}>{a.count}</td>
                        <td style={{padding:'10px 14px',color:C.gold,fontWeight:800}}>R {a.comm}k</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </>
            : <p style={{color:C.muted}}>No sold deals yet.</p>}
        </Card>
      )}

      {tab==='summary' && (
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:20}} className="grid-2">
          <Card>
            <h3 style={{fontWeight:800,marginBottom:18,fontSize:14}}>Commission Summary</h3>
            {[
              ['Total Commission Earned', fmt(totalComm)],
              ['Commission Paid',         fmt(paidComm)],
              ['Commission Pending',      fmt(pendComm)],
              ['Average per Sale',        fmt(avgComm)],
              ['Pipeline (weighted)',     fmt(pipeW)],
            ].map(([l,v])=>(
              <div key={l} style={{display:'flex',justifyContent:'space-between',padding:'11px 0',borderBottom:`1px solid ${C.border}`}}>
                <span style={{color:C.muted,fontSize:13}}>{l}</span>
                <span style={{fontWeight:800,fontSize:13}}>{v}</span>
              </div>
            ))}
          </Card>
          <Card>
            <h3 style={{fontWeight:800,marginBottom:18,fontSize:14}}>Deals by Status</h3>
            {DEAL_STATUSES.map(s=>{
              const cnt=deals.filter(d=>d.status===s).length;
              return (
                <div key={s} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'11px 0',borderBottom:`1px solid ${C.border}`}}>
                  <Badge status={s}/>
                  <span style={{fontWeight:800,fontSize:15}}>{cnt}</span>
                </div>
              );
            })}
          </Card>
        </div>
      )}
    </div>
  );
}

const NAV=[
  {id:'dashboard',  label:'Dashboard',       icon:'dashboard'},
  {id:'deals',      label:'Deals & Sales',   icon:'deals'},
  {id:'pipeline',   label:'Pipeline',        icon:'pipeline'},
  {id:'calculator', label:'Comm. Calc',      icon:'calculator'},
  {id:'income',     label:'Income Report',   icon:'income'},
  {id:'reports',    label:'Reports',         icon:'reports'},
];

function App() {
  const [page,setPage]       = useState('dashboard');
  const [deals,setDeals]     = useState(SAMPLE_DEALS);
  const [pipe,setPipe]       = useState(SAMPLE_PIPELINE);
  const [navOpen,setNavOpen] = useState(false);

  const addDeal  = d  => setDeals(p=>[{...d,id:Date.now()},...p]);
  const editDeal = d  => setDeals(p=>p.map(x=>x.id===d.id?d:x));
  const delDeal  = id => setDeals(p=>p.filter(x=>x.id!==id));

  const addPipe  = x  => setPipe(p=>[{...x,id:Date.now()},...p]);
  const editPipe = x  => setPipe(p=>p.map(y=>y.id===x.id?x:y));
  const delPipe  = id => setPipe(p=>p.filter(x=>x.id!==id));

  const nav = (id) => { setPage(id); setNavOpen(false); };

  const renderPage = () => {
    switch(page) {
      case 'dashboard':  return <Dashboard deals={deals} pipeline={pipe}/>;
      case 'deals':      return <DealsTracker deals={deals} onAdd={addDeal} onEdit={editDeal} onDelete={delDeal}/>;
      case 'pipeline':   return <Pipeline pipeline={pipe} onAdd={addPipe} onEdit={editPipe} onDelete={delPipe}/>;
      case 'calculator': return <CommCalc/>;
      case 'income':     return <IncomeReport deals={deals}/>;
      case 'reports':    return <Reports deals={deals} pipeline={pipe}/>;
      default:           return <Dashboard deals={deals} pipeline={pipe}/>;
    }
  };

  const SIDEBAR_W = 232;

  return (
    <div style={{display:'flex',minHeight:'100vh',background:C.bg}}>

      {/* Mobile overlay */}
      {navOpen && <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.45)',zIndex:98}} onClick={()=>setNavOpen(false)}/>}

      {/* SIDEBAR */}
      <aside className={`sidebar${navOpen?' open':''}`} style={{
        width:SIDEBAR_W,background:C.dark,color:'#fff',
        display:'flex',flexDirection:'column',
        position:'fixed',top:0,left:0,height:'100vh',zIndex:99,
        transition:'transform .25s ease',
      }}>
        {/* Logo */}
        <div style={{padding:'26px 22px 20px',borderBottom:'1px solid rgba(255,255,255,0.1)'}}>
          <div style={{display:'flex',alignItems:'center',gap:11}}>
            <div style={{width:34,height:34,background:C.gold,borderRadius:9,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
              <Ico name="home" size={18}/>
            </div>
            <div>
              <div style={{fontSize:16,fontWeight:900,letterSpacing:1.5,color:'#fff',lineHeight:1}}>AgentOS</div>
              <div style={{fontSize:9,color:C.gold,letterSpacing:2,textTransform:'uppercase',marginTop:2}}>Real Estate</div>
            </div>
          </div>
        </div>

        {/* Nav */}
        <nav style={{flex:1,padding:'14px 10px',overflowY:'auto'}}>
          {NAV.map(item=>{
            const active=page===item.id;
            return (
              <button key={item.id} onClick={()=>nav(item.id)} style={{
                display:'flex',alignItems:'center',gap:11,width:'100%',
                padding:'11px 13px',marginBottom:3,
                borderRadius:9,border:'none',cursor:'pointer',textAlign:'left',
                background:active?C.gold:'transparent',
                color:active?C.dark:'rgba(255,255,255,0.65)',
                fontWeight:active?800:500,fontSize:13.5,
                transition:'all .15s',
              }}>
                <span style={{color:active?C.dark:'rgba(255,255,255,0.5)',display:'flex'}}>
                  <Ico name={item.icon} size={17}/>
                </span>
                {item.label}
              </button>
            );
          })}
        </nav>

        {/* Footer */}
        <div style={{padding:'16px 20px',borderTop:'1px solid rgba(255,255,255,0.1)'}}>
          <div style={{fontSize:13,fontWeight:800,color:'#fff'}}>{AGENT_ME} &amp; {AGENT_WIFE}</div>
          <div style={{fontSize:10,color:'rgba(255,255,255,0.4)',marginTop:2,letterSpacing:.5}}>Engel &amp; Völkers · Cape Town</div>
        </div>
      </aside>

      {/* MAIN */}
      <div className="main-wrap" style={{flex:1,marginLeft:SIDEBAR_W,display:'flex',flexDirection:'column',minHeight:'100vh'}}>

        {/* Mobile header */}
        <header className="mob-header" style={{display:'none',background:C.dark,padding:'13px 16px',alignItems:'center',justifyContent:'space-between',position:'sticky',top:0,zIndex:50}}>
          <button onClick={()=>setNavOpen(true)} style={{background:'none',border:'none',cursor:'pointer',color:'#fff',display:'flex',padding:4}}>
            <Ico name="menu" size={22}/>
          </button>
          <div style={{fontSize:14,fontWeight:900,color:'#fff',letterSpacing:1.5}}>AgentOS</div>
          <div style={{width:30}}/>
        </header>

        <main className="page-pad" style={{flex:1,padding:'32px 30px'}}>
          {renderPage()}
        </main>

        <footer style={{textAlign:'center',padding:'16px',fontSize:11,color:C.muted,borderTop:`1px solid ${C.border}`}}>
          AgentOS · Powered by Engel &amp; Völkers · Built for {AGENT_ME} &amp; {AGENT_WIFE}
        </footer>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
