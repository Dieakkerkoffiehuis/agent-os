<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>AgentOS — Engel &amp; Völkers</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#1a1a1a;color:#f0ede6;min-height:100vh}
#root{display:flex;min-height:100vh}

/* Sidebar */
.sidebar{width:240px;min-width:240px;background:#111;border-right:1px solid #2a2a2a;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto}
.sidebar-logo{padding:24px 20px 20px;border-bottom:1px solid #2a2a2a}
.logo-title{font-size:22px;font-weight:700;color:#c9a84c;letter-spacing:1px}
.logo-sub{font-size:10px;color:#888;letter-spacing:2px;text-transform:uppercase;margin-top:2px}
.sidebar-nav{flex:1;padding:16px 0}
.nav-item{display:flex;align-items:center;gap:12px;padding:12px 20px;cursor:pointer;color:#aaa;font-size:14px;font-weight:500;transition:all .2s;border-left:3px solid transparent}
.nav-item:hover{color:#f0ede6;background:#1a1a1a}
.nav-item.active{color:#c9a84c;background:#1f1a0e;border-left-color:#c9a84c}
.nav-icon{width:18px;height:18px;flex-shrink:0}
.sidebar-footer{padding:16px 20px;border-top:1px solid #2a2a2a;font-size:12px;color:#555}

/* Main */
.main{flex:1;overflow-x:hidden;background:#1a1a1a}
.topbar{background:#111;border-bottom:1px solid #2a2a2a;padding:16px 32px;display:flex;align-items:center;justify-content:space-between}
.topbar-title{font-size:20px;font-weight:600;color:#f0ede6}
.topbar-sub{font-size:12px;color:#888;margin-top:2px}
.content{padding:32px}

/* Cards */
.card{background:#222;border:1px solid #2a2a2a;border-radius:12px;padding:24px}
.card-sm{background:#222;border:1px solid #2a2a2a;border-radius:10px;padding:18px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;margin-bottom:24px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-bottom:24px}
.grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:20px;margin-bottom:24px}

/* KPI */
.kpi-label{font-size:11px;color:#888;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.kpi-value{font-size:28px;font-weight:700;color:#f0ede6}
.kpi-value.gold{color:#c9a84c}
.kpi-badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:20px;margin-top:6px}
.kpi-badge.up{background:#1a3a1a;color:#4caf50}
.kpi-badge.down{background:#3a1a1a;color:#f44336}
.kpi-badge.neutral{background:#2a2a2a;color:#aaa}

/* Section headers */
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.section-title{font-size:16px;font-weight:600;color:#f0ede6}
.section-sub{font-size:13px;color:#888}

/* Table */
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:10px 14px;color:#888;font-weight:500;font-size:11px;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid #2a2a2a}
td{padding:12px 14px;border-bottom:1px solid #222;color:#d0cdc6}
tr:hover td{background:#252525}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.badge-green{background:#1a3a1a;color:#4caf50}
.badge-gold{background:#2a200a;color:#c9a84c}
.badge-blue{background:#0a1a2a;color:#64b5f6}
.badge-red{background:#3a1a1a;color:#ef5350}
.badge-grey{background:#2a2a2a;color:#888}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:8px;padding:10px 20px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .2s}
.btn-gold{background:#c9a84c;color:#111}
.btn-gold:hover{background:#d4b460}
.btn-outline{background:transparent;border:1px solid #333;color:#aaa}
.btn-outline:hover{border-color:#c9a84c;color:#c9a84c}
.btn-sm{padding:6px 14px;font-size:12px}

/* Form */
.form-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
.form-group{display:flex;flex-direction:column;gap:6px}
.form-group.full{grid-column:1/-1}
label{font-size:12px;color:#888;font-weight:500}
input,select,textarea{background:#1a1a1a;border:1px solid #333;border-radius:8px;padding:10px 14px;color:#f0ede6;font-size:14px;width:100%;transition:border .2s}
input:focus,select:focus,textarea:focus{outline:none;border-color:#c9a84c}
input[type=range]{padding:0;cursor:pointer}

/* Modal */
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px}
.modal{background:#1a1a1a;border:1px solid #333;border-radius:16px;padding:32px;width:100%;max-width:640px;max-height:90vh;overflow-y:auto}
.modal-title{font-size:18px;font-weight:700;color:#c9a84c;margin-bottom:24px}
.modal-actions{display:flex;gap:12px;justify-content:flex-end;margin-top:24px}

/* Progress bar */
.progress-bar{height:8px;background:#2a2a2a;border-radius:4px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#c9a84c,#e8c96a);border-radius:4px;transition:width .4s}

/* Recharts override */
.recharts-tooltip-wrapper .recharts-default-tooltip{background:#222 !important;border:1px solid #333 !important;border-radius:8px !important}
.recharts-legend-item-text{color:#aaa !important;font-size:12px !important}

/* Mobile */
@media(max-width:768px){
  .sidebar{width:60px;min-width:60px}
  .logo-title,.logo-sub,.nav-label,.sidebar-footer{display:none}
  .nav-item{padding:14px;justify-content:center}
  .content{padding:16px}
  .grid-4,.grid-3{grid-template-columns:repeat(2,1fr)}
  .grid-2{grid-template-columns:1fr}
  .form-grid{grid-template-columns:1fr}
}
@media(max-width:480px){
  .grid-4,.grid-3,.grid-2{grid-template-columns:1fr}
}

/* Chart containers */
.chart-wrap{width:100%;height:280px;margin-top:16px}

/* Gold divider */
.gold-line{height:2px;background:linear-gradient(90deg,#c9a84c,transparent);margin:24px 0;border:none}

/* Pill tabs */
.tabs{display:flex;gap:8px;margin-bottom:24px;flex-wrap:wrap}
.tab{padding:8px 18px;border-radius:20px;font-size:13px;font-weight:500;cursor:pointer;border:1px solid #333;color:#888;background:transparent;transition:all .2s}
.tab.active{background:#c9a84c;color:#111;border-color:#c9a84c}

/* Commission calc */
.calc-result{background:#1f1a0e;border:1px solid #3a2d0a;border-radius:10px;padding:20px;margin-top:20px}
.calc-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #2a2a2a;font-size:14px}
.calc-row:last-child{border-bottom:none}
.calc-row.total{font-weight:700;font-size:16px;color:#c9a84c}
.calc-label{color:#888}
.calc-value{color:#f0ede6;font-weight:600}

/* Spinner */
.spinner{display:inline-block;width:40px;height:40px;border:3px solid #333;border-top-color:#c9a84c;border-radius:50%;animation:spin 1s linear infinite;margin:40px auto}
@keyframes spin{to{transform:rotate(360deg)}}

/* Empty state */
.empty{text-align:center;padding:60px 20px;color:#555}
.empty-icon{font-size:48px;margin-bottom:16px}
.empty-text{font-size:15px}
</style>
</head>
<body>
<div id="root"><div style="display:flex;align-items:center;justify-content:center;height:100vh;color:#c9a84c;font-size:18px">Loading AgentOS…</div></div>
<script type="module">
import{createElement as h,useState,useMemo,Fragment,useCallback}from'https://esm.sh/react@18.3.1';
import{createRoot}from'https://esm.sh/react-dom@18.3.1/client';
import{BarChart,Bar,PieChart,Pie,Cell,XAxis,YAxis,CartesianGrid,Tooltip,Legend,ResponsiveContainer,LineChart,Line}from'https://esm.sh/recharts@2.12.7?deps=react@18.3.1,react-dom@18.3.1';
import htm from'https://esm.sh/htm@3.1.1';
const html=htm.bind(h);

// ─── SAMPLE DATA ────────────────────────────────────────────────────────────
const SAMPLE_DEALS=[
  {id:1,property:'12 Clifton 1st Beach Rd',type:'Residential',agent:'Zaviér',salePrice:18500000,commPct:5,agencySplit:50,status:'Closed',date:'2026-01-14',area:'Clifton'},
  {id:2,property:'Fresnaye Manor, Avenue Fresnaye',type:'Residential',agent:'Maré',salePrice:12200000,commPct:5,agencySplit:50,status:'Closed',date:'2026-01-28',area:'Fresnaye'},
  {id:3,property:'Bantry Bay Penthouse',type:'Residential',agent:'Zaviér',salePrice:22000000,commPct:4.5,agencySplit:50,status:'Closed',date:'2026-02-10',area:'Bantry Bay'},
  {id:4,property:'Camps Bay Villa — Sunset Drive',type:'Residential',agent:'Maré',salePrice:9800000,commPct:5,agencySplit:50,status:'Closed',date:'2026-02-22',area:'Camps Bay'},
  {id:5,property:'Sea Point Apartment 14B',type:'Residential',agent:'Zaviér',salePrice:4200000,commPct:6,agencySplit:50,status:'Closed',date:'2026-03-05',area:'Sea Point'},
  {id:6,property:'Constantia Winelands Estate',type:'Residential',agent:'Zaviér',salePrice:35000000,commPct:4,agencySplit:50,status:'Closed',date:'2026-03-18',area:'Constantia'},
  {id:7,property:'Hout Bay Harbour View',type:'Residential',agent:'Maré',salePrice:7600000,commPct:5.5,agencySplit:50,status:'Closed',date:'2026-04-02',area:'Hout Bay'},
  {id:8,property:'Green Point Modern Duplex',type:'Residential',agent:'Maré',salePrice:5400000,commPct:5,agencySplit:50,status:'Closed',date:'2026-04-15',area:'Green Point'},
  {id:9,property:'De Waterkant Loft — Heritage Sq',type:'Residential',agent:'Zaviér',salePrice:3800000,commPct:6,agencySplit:50,status:'Pending',date:'2026-04-28',area:'De Waterkant'},
  {id:10,property:'Bishopscourt Private Estate',type:'Residential',agent:'Maré',salePrice:28000000,commPct:4,agencySplit:50,status:'Pending',date:'2026-05-02',area:'Bishopscourt'},
];

const SAMPLE_PIPELINE=[
  {id:1,property:'Llandudno Beachfront',stage:'Viewing',value:15000000,agent:'Zaviér',probability:25,notes:'Second viewing booked'},
  {id:2,property:'Tamboerskloof Victorian',stage:'Offer',value:6800000,agent:'Maré',probability:70,notes:'Verbal offer received'},
  {id:3,property:'Mouille Point Seaview',stage:'Negotiation',value:8500000,agent:'Zaviér',probability:60,notes:'Countered at 8.2M'},
  {id:4,property:'Oranjezicht Heritage Home',stage:'Due Diligence',value:11200000,agent:'Maré',probability:85,notes:'Attorneys appointed'},
  {id:5,property:'Atlantic Seaboard New Dev',stage:'Signed',value:19500000,agent:'Zaviér',probability:95,notes:'Transfer expected June'},
  {id:6,property:'Kenilworth Family Home',stage:'Viewing',value:4200000,agent:'Maré',probability:20,notes:'First showing this week'},
  {id:7,property:'Newlands Cottage',stage:'Lead',value:3100000,agent:'Zaviér',probability:10,notes:'Referral from past client'},
];

const TARGETS={zaviér:{annual:3000000,monthly:250000},maré:{annual:2000000,monthly:167000}};

// ─── HELPERS ────────────────────────────────────────────────────────────────
const fmt=n=>new Intl.NumberFormat('en-ZA',{style:'currency',currency:'ZAR',maximumFractionDigits:0}).format(n);
const fmtN=n=>new Intl.NumberFormat('en-ZA',{maximumFractionDigits:0}).format(n);
const fmtPct=n=>`${n}%`;
const fmtDate=d=>new Date(d).toLocaleDateString('en-ZA',{day:'numeric',month:'short',year:'numeric'});

function calcCommission(deal){
  const total=deal.salePrice*(deal.commPct/100);
  const agencyShare=total*(deal.agencySplit/100);
  const agentShare=total-agencyShare;
  return{total,agencyShare,agentShare};
}

function getAgentCommission(deals,agent){
  return deals.filter(d=>d.agent===agent&&d.status==='Closed').reduce((sum,d)=>{
    const{agentShare}=calcCommission(d);
    return sum+agentShare;
  },0);
}

// ─── ICONS ──────────────────────────────────────────────────────────────────
const Icon=({name,size=18,color='currentColor'})=>{
  const icons={
    dashboard:`<svg width="${size}" height="${size}" fill="none" stroke="${color}" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>`,
    deals:`<svg width="${size}" height="${size}" fill="none" stroke="${color}" stroke-width="2" viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><path d="M9 12h6M9 16h4"/></svg>`,
    pipeline:`<svg width="${size}" height="${size}" fill="none" stroke="${color}" stroke-width="2" viewBox="0 0 24 24"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>`,
    calc:`<svg width="${size}" height="${size}" fill="none" stroke="${color}" stroke-width="2" viewBox="0 0 24 24"><rect x="4" y="2" width="16" height="20" rx="2"/><path d="M8 6h8M8 10h8M8 14h4"/></svg>`,
    income:`<svg width="${size}" height="${size}" fill="none" stroke="${color}" stroke-width="2" viewBox="0 0 24 24"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>`,
    reports:`<svg width="${size}" height="${size}" fill="none" stroke="${color}" stroke-width="2" viewBox="0 0 24 24"><path d="M18 20V10M12 20V4M6 20v-6"/></svg>`,
    plus:`<svg width="${size}" height="${size}" fill="none" stroke="${color}" stroke-width="2" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>`,
    x:`<svg width="${size}" height="${size}" fill="none" stroke="${color}" stroke-width="2" viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12"/></svg>`,
    edit:`<svg width="${size}" height="${size}" fill="none" stroke="${color}" stroke-width="2" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>`,
    trash:`<svg width="${size}" height="${size}" fill="none" stroke="${color}" stroke-width="2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6M9 6V4h6v2"/></svg>`,
    home:`<svg width="${size}" height="${size}" fill="none" stroke="${color}" stroke-width="2" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>`,
  };
  return html`<span class="nav-icon" dangerouslySetInnerHTML=${{__html:icons[name]||icons.home}}/>`;
};

// ─── DEAL MODAL ─────────────────────────────────────────────────────────────
const DealModal=({deal,onSave,onClose})=>{
  const[form,setForm]=useState(deal||{property:'',type:'Residential',agent:'Zaviér',salePrice:'',commPct:5,agencySplit:50,status:'Pending',date:new Date().toISOString().slice(0,10),area:''});
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));
  const save=()=>{
    if(!form.property||!form.salePrice)return alert('Property name and sale price are required.');
    onSave({...form,salePrice:Number(form.salePrice),commPct:Number(form.commPct),agencySplit:Number(form.agencySplit),id:deal?.id||Date.now()});
  };
  return html`
    <div class="modal-backdrop" onClick=${e=>{if(e.target===e.currentTarget)onClose()}}>
      <div class="modal">
        <div class="modal-title">${deal?'Edit Deal':'New Deal'}</div>
        <div class="form-grid">
          <div class="form-group full">
            <label>Property Name / Address</label>
            <input value=${form.property} onInput=${e=>set('property',e.target.value)} placeholder="e.g. Clifton 1st Beach Rd"/>
          </div>
          <div class="form-group">
            <label>Area</label>
            <input value=${form.area} onInput=${e=>set('area',e.target.value)} placeholder="e.g. Clifton"/>
          </div>
          <div class="form-group">
            <label>Type</label>
            <select value=${form.type} onChange=${e=>set('type',e.target.value)}>
              <option>Residential</option><option>Commercial</option><option>Land</option>
            </select>
          </div>
          <div class="form-group">
            <label>Agent</label>
            <select value=${form.agent} onChange=${e=>set('agent',e.target.value)}>
              <option>Zaviér</option><option>Maré</option>
            </select>
          </div>
          <div class="form-group">
            <label>Sale Price (ZAR)</label>
            <input type="number" value=${form.salePrice} onInput=${e=>set('salePrice',e.target.value)} placeholder="10000000"/>
          </div>
          <div class="form-group">
            <label>Commission % — ${form.commPct}%</label>
            <input type="range" min="1" max="10" step="0.5" value=${form.commPct} onInput=${e=>set('commPct',e.target.value)}/>
          </div>
          <div class="form-group">
            <label>Agency Split % — ${form.agencySplit}%</label>
            <input type="range" min="0" max="100" step="5" value=${form.agencySplit} onInput=${e=>set('agencySplit',e.target.value)}/>
          </div>
          <div class="form-group">
            <label>Status</label>
            <select value=${form.status} onChange=${e=>set('status',e.target.value)}>
              <option>Pending</option><option>Closed</option><option>Cancelled</option>
            </select>
          </div>
          <div class="form-group">
            <label>Date</label>
            <input type="date" value=${form.date} onChange=${e=>set('date',e.target.value)}/>
          </div>
        </div>
        <div class="modal-actions">
          <button class="btn btn-outline" onClick=${onClose}>Cancel</button>
          <button class="btn btn-gold" onClick=${save}>Save Deal</button>
        </div>
      </div>
    </div>`;
};

// ─── PIPELINE MODAL ──────────────────────────────────────────────────────────
const PipelineModal=({item,onSave,onClose})=>{
  const[form,setForm]=useState(item||{property:'',stage:'Lead',value:'',agent:'Zaviér',probability:50,notes:''});
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));
  const save=()=>{
    if(!form.property)return alert('Property name required.');
    onSave({...form,value:Number(form.value),probability:Number(form.probability),id:item?.id||Date.now()});
  };
  return html`
    <div class="modal-backdrop" onClick=${e=>{if(e.target===e.currentTarget)onClose()}}>
      <div class="modal">
        <div class="modal-title">${item?'Edit Pipeline Item':'Add to Pipeline'}</div>
        <div class="form-grid">
          <div class="form-group full">
            <label>Property</label>
            <input value=${form.property} onInput=${e=>set('property',e.target.value)} placeholder="e.g. Llandudno Beachfront"/>
          </div>
          <div class="form-group">
            <label>Stage</label>
            <select value=${form.stage} onChange=${e=>set('stage',e.target.value)}>
              <option>Lead</option><option>Viewing</option><option>Offer</option><option>Negotiation</option><option>Due Diligence</option><option>Signed</option>
            </select>
          </div>
          <div class="form-group">
            <label>Agent</label>
            <select value=${form.agent} onChange=${e=>set('agent',e.target.value)}>
              <option>Zaviér</option><option>Maré</option>
            </select>
          </div>
          <div class="form-group">
            <label>Estimated Value (ZAR)</label>
            <input type="number" value=${form.value} onInput=${e=>set('value',e.target.value)} placeholder="5000000"/>
          </div>
          <div class="form-group">
            <label>Probability — ${form.probability}%</label>
            <input type="range" min="0" max="100" step="5" value=${form.probability} onInput=${e=>set('probability',e.target.value)}/>
          </div>
          <div class="form-group full">
            <label>Notes</label>
            <textarea rows="3" value=${form.notes} onInput=${e=>set('notes',e.target.value)} placeholder="Any relevant notes…"/>
          </div>
        </div>
        <div class="modal-actions">
          <button class="btn btn-outline" onClick=${onClose}>Cancel</button>
          <button class="btn btn-gold" onClick=${save}>Save</button>
        </div>
      </div>
    </div>`;
};

// ─── DASHBOARD ───────────────────────────────────────────────────────────────
const Dashboard=({deals,pipeline})=>{
  const closed=deals.filter(d=>d.status==='Closed');
  const totalVol=closed.reduce((s,d)=>s+d.salePrice,0);
  const zComm=getAgentCommission(deals,'Zaviér');
  const mComm=getAgentCommission(deals,'Maré');
  const totalComm=zComm+mComm;
  const pipelineVal=pipeline.reduce((s,p)=>s+p.value,0);
  const weightedPipeline=pipeline.reduce((s,p)=>s+p.value*(p.probability/100),0);

  const monthlyData=['Jan','Feb','Mar','Apr','May'].map((month,i)=>{
    const mDeals=closed.filter(d=>new Date(d.date).getMonth()===i);
    const vol=mDeals.reduce((s,d)=>s+d.salePrice,0);
    const comm=mDeals.reduce((s,d)=>s+calcCommission(d).agentShare,0);
    return{month,vol:vol/1e6,comm:comm/1000};
  });

  const byAgent=[
    {name:'Zaviér',value:zComm,color:'#c9a84c'},
    {name:'Maré',value:mComm,color:'#64b5f6'},
  ];

  return html`
    <div>
      <div class="grid-4">
        <div class="card-sm">
          <div class="kpi-label">Total Sales Volume</div>
          <div class="kpi-value gold">${fmt(totalVol)}</div>
          <span class="kpi-badge up">↑ YTD 2026</span>
        </div>
        <div class="card-sm">
          <div class="kpi-label">Agent Commission Earned</div>
          <div class="kpi-value gold">${fmt(totalComm)}</div>
          <span class="kpi-badge up">${closed.length} closed deals</span>
        </div>
        <div class="card-sm">
          <div class="kpi-label">Pipeline (Total Value)</div>
          <div class="kpi-value">${fmt(pipelineVal)}</div>
          <span class="kpi-badge neutral">Weighted: ${fmt(weightedPipeline)}</span>
        </div>
        <div class="card-sm">
          <div class="kpi-label">Active Listings</div>
          <div class="kpi-value">${pipeline.length}</div>

// ─── PIPELINE ────────────────────────────────────────────────────────────────
const STAGES=['Lead','Viewing','Offer','Negotiation','Due Diligence','Signed'];
const STAGE_COLORS={Lead:'#555',Viewing:'#1565c0',Offer:'#6a1b9a',Negotiation:'#e65100',['Due Diligence']:'#2e7d32',Signed:'#c9a84c'};

const Pipeline=({pipeline,setPipeline})=>{
  const[modal,setModal]=useState(null);
  const save=item=>{
    setPipeline(prev=>prev.some(p=>p.id===item.id)?prev.map(p=>p.id===item.id?item:p):[...prev,item]);
    setModal(null);
  };
  const del=id=>{ if(confirm('Remove from pipeline?'))setPipeline(prev=>prev.filter(p=>p.id!==id)); };
  const total=pipeline.reduce((s,p)=>s+p.value,0);
  const weighted=pipeline.reduce((s,p)=>s+p.value*(p.probability/100),0);

  const stageData=STAGES.map(s=>({
    stage:s,
    count:pipeline.filter(p=>p.stage===s).length,
    value:pipeline.filter(p=>p.stage===s).reduce((a,p)=>a+p.value,0),

  return html`

        </div>

              h(XAxis,{dataKey:'stage',stroke:'#666',tick:{fill:'#888',fontSize:11}}),
              h(YAxis,{stroke:'#666',tick:{fill:'#888',fontSize:11}}),

            </tr></thead>
            <tbody>
              ${pipeline.map(p=>html`
                <tr key=${p.id}>
                  <td style="font-weight:500">${p.property}</td>

// ─── COMMISSION CALCULATOR ───────────────────────────────────────────────────
const CommCalc=()=>{
  const[price,setPrice]=useState(10000000);
  const[commPct,setCommPct]=useState(5);
  const[agencySplit,setAgencySplit]=useState(50);
  const[agent,setAgent]=useState('Zaviér');

  const totalComm=price*(commPct/100);
  const agencyShare=totalComm*(agencySplit/100);
  const agentShare=totalComm-agencyShare;

  return html`
    <div style="max-width:680px;margin:0 auto">
      <div class="card">
        <div class="section-title" style="margin-bottom:24px">Commission Calculator</div>
        <div style="display:flex;flex-direction:column;gap:20px">
          <div class="form-group">
            <label>Sale Price: ${fmt(price)}</label>
            <input type="range" min="500000" max="100000000" step="100000" value=${price} onInput=${e=>setPrice(Number(e.target.value))}/>
            <input type="number" value=${price} onInput=${e=>setPrice(Number(e.target.value))} placeholder="10000000"/>
          </div>
          <div class="form-group">
            <label>Commission Rate: ${commPct}%</label>
            <input type="range" min="1" max="10" step="0.5" value=${commPct} onInput=${e=>setCommPct(Number(e.target.value))}/>
          </div>
          <div class="form-group">
            <label>Agency Split: ${agencySplit}%</label>
            <input type="range" min="0" max="100" step="5" value=${agencySplit} onInput=${e=>setAgencySplit(Number(e.target.value))}/>
          </div>
          <div class="form-group">
            <label>Agent</label>
            <select value=${agent} onChange=${e=>setAgent(e.target.value)}>
              <option>Zaviér</option><option>Maré</option>
            </select>
          </div>
        </div>

        <div class="calc-result">
          <div class="calc-row">
            <span class="calc-label">Sale Price</span>
            <span class="calc-value">${fmt(price)}</span>
          </div>
          <div class="calc-row">
            <span class="calc-label">Total Commission (${commPct}%)</span>
            <span class="calc-value">${fmt(totalComm)}</span>
          </div>
          <div class="calc-row">
            <span class="calc-label">Agency Share (${agencySplit}%)</span>
            <span class="calc-value">${fmt(agencyShare)}</span>
          </div>
          <div class="calc-row total">
            <span>${agent}'s Commission</span>
            <span>${fmt(agentShare)}</span>
          </div>
        </div>

        <div style="margin-top:24px">
          ${h(ResponsiveContainer,{width:'100%',height:200},
            h(PieChart,{},
              h(Pie,{
                data:[
                  {name:'Agency Share',value:agencyShare,color:'#555'},
                  {name:`${agent}'s Commission`,value:agentShare,color:'#c9a84c'},
                ],
                dataKey:'value',nameKey:'name',cx:'50%',cy:'50%',outerRadius:80,
              },
                [
                  h(Cell,{key:0,fill:'#555'}),
                  h(Cell,{key:1,fill:'#c9a84c'}),
                ]
              ),
              h(Tooltip,{formatter:v=>fmt(v),contentStyle:{background:'#222',border:'1px solid #333',borderRadius:'8px'}}),
              h(Legend,{})
            )
          )}
        </div>
      </div>
    </div>`;
};

// ─── INCOME REPORT ───────────────────────────────────────────────────────────
const Income=({deals})=>{

  const total=zComm+mComm;
  const zTarget=TARGETS['zaviér'].annual;
  const mTarget=TARGETS['maré'].annual;

  const monthlyComparison=['Jan','Feb','Mar','Apr','May'].map((month,i)=>{
    const zM=zDeals.filter(d=>new Date(d.date).getMonth()===i).reduce((s,d)=>s+calcCommission(d).agentShare,0);
    const mM=mDeals.filter(d=>new Date(d.date).getMonth()===i).reduce((s,d)=>s+calcCommission(d).agentShare,0);
    return{month,Zaviér:zM/1000,Maré:mM/1000};
  });

  return html`
    <div>
      <div class="grid-2">
        <div class="card">
          <div class="kpi-label">Zaviér — YTD Commission</div>
          <div class="kpi-value gold">${fmt(zComm)}</div>

          <div class="kpi-label">Maré — YTD Commission</div>
          <div class="kpi-value" style="color:#64b5f6">${fmt(mComm)}</div>
          <div style="margin-top:12px">
            <div style="display:flex;justify-content:space-between;font-size:12px;color:#888;margin-bottom:6px">
              <span>Annual Target: ${fmt(mTarget)}</span>
              <span>${((mComm/mTarget)*100).toFixed(0)}%</span>
            </div>
            <div class="progress-bar">
              <div class="progress-fill" style="width:${Math.min((mComm/mTarget)*100,100)}%;background:linear-gradient(90deg,#1565c0,#64b5f6)"/>
            </div>
          </div>
          <div style="margin-top:12px;font-size:13px;color:#888">${mDeals.length} deals closed · Avg ${fmt(mComm/Math.max(mDeals.length,1))}/deal</div>
        </div>
      </div>

      <div class="card" style="margin-bottom:24px">
        <div class="section-title" style="margin-bottom:16px">Monthly Commission Comparison (ZAR '000)</div>
        <div class="chart-wrap">
          ${h(ResponsiveContainer,{width:'100%',height:280},
            h(BarChart,{data:monthlyComparison,margin:{top:5,right:20,left:0,bottom:5}},
              h(CartesianGrid,{strokeDasharray:'3 3',stroke:'#2a2a2a'}),
              h(XAxis,{dataKey:'month',stroke:'#666',tick:{fill:'#888',fontSize:12}}),
              h(YAxis,{stroke:'#666',tick:{fill:'#888',fontSize:12}}),
              h(Tooltip,{contentStyle:{background:'#222',border:'1px solid #333',borderRadius:'8px',color:'#f0ede6'},formatter:v=>`R ${v}k`}),

              h(Bar,{dataKey:'Zaviér',fill:'#c9a84c',radius:[4,4,0,0]}),

  {id:'reports',label:'Reports',icon:'reports'},
];

const PAGE_TITLES={
  dashboard:{title:'Dashboard',sub:'Overview for 2026 YTD'},
  deals:{title:'Deal Tracker',sub:'All residential transactions'},
  pipeline:{title:'Pipeline',sub:'Active listings & prospects'},
  calculator:{title:'Commission Calculator',sub:'Quick commission breakdown'},
  income:{title:'Income Report',sub:'Zaviér & Maré earnings'},
  reports:{title:'Reports',sub:'Full analytics & ledger'},
};

function App(){
  const[page,setPage]=useState('dashboard');
  const[deals,setDeals]=useState(SAMPLE_DEALS);
  const[pipeline,setPipeline]=useState(SAMPLE_PIPELINE);
  const{title,sub}=PAGE_TITLES[page];

  return html`
    <div id="root" style="display:flex;min-height:100vh">
      <aside class="sidebar">
        <div class="sidebar-logo">
          <div class="logo-title">AgentOS</div>
          <div class="logo-sub">Engel &amp; Völkers · CPT</div>
        </div>
        <nav class="sidebar-nav">
          ${NAV.map(n=>html`
            <div key=${n.id} class="nav-item ${page===n.id?'active':''}" onClick=${()=>setPage(n.id)}>
              ${h(Icon,{name:n.icon,size:18,color:page===n.id?'#c9a84c':'currentColor'})}
              <span class="nav-label">${n.label}</span>
            </div>`)}
        </nav>
        <div class="sidebar-footer">
          <div style="color:#c9a84c;font-weight:600;margin-bottom:2px">Zaviér &amp; Maré</div>
          <div>Engel &amp; Völkers</div>
          <div style="margin-top:8px;color:#333;font-size:10px">AgentOS v1.0</div>
        </div>
      </aside>

      <div class="main">
        <div class="topbar">
          <div>
            <div class="topbar-title">${title}</div>
            <div class="topbar-sub">${sub}</div>
          </div>
          <div style="font-size:13px;color:#555">${new Date().toLocaleDateString('en-ZA',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}</div>
        </div>
        <div class="content">
          ${page==='dashboard'?h(Dashboard,{deals,pipeline}):null}
          ${page==='deals'?h(Deals,{deals,setDeals}):null}
          ${page==='pipeline'?h(Pipeline,{pipeline,setPipeline}):null}
          ${page==='calculator'?h(CommCalc,{}):null}
          ${page==='income'?h(Income,{deals}):null}
          ${page==='reports'?h(Reports,{deals,pipeline}):null}
        </div>
      </div>
    </div>`;
}

createRoot(document.getElementById('root')).render(h(App,null));
</script>
</body>
</html>
