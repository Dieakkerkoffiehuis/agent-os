<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>AgentOS – Real Estate Command Centre</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#F4F2ED;color:#1C1C1E}
    ::-webkit-scrollbar{width:5px;height:5px}
    ::-webkit-scrollbar-thumb{background:#C9A84C55;border-radius:10px}
    input,select,textarea,button{font-family:inherit}
    input[type=range]{accent-color:#C9A84C}
    @media(max-width:768px){
      .sidebar{transform:translateX(-100%)}
      .sidebar.open{transform:translateX(0)}
      .main-wrap{margin-left:0!important}
      .mob-hdr{display:flex!important}
      .page-pad{padding:18px 14px!important}
      .g2{grid-template-columns:1fr!important}
      .g3{grid-template-columns:1fr 1fr!important}
    }
    @media(max-width:480px){.g3{grid-template-columns:1fr!important}}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useMemo,useCallback}=React;
const{BarChart,Bar,LineChart,Line,PieChart,Pie,Cell,XAxis,YAxis,CartesianGrid,Tooltip,Legend,ResponsiveContainer}=Recharts;

// ── CONSTANTS ───────────────────────────────────────────────
const ME='Zaviér', WIFE='Maré';
const STATUSES=['Lead','Mandate Signed','Under Offer','Sold','Registered','Paid'];
const SOURCES=['Referral','Walk-in','Cold Call','Social Media','Website','Previous Client','Other'];
const C={dark:'#1C1C1E',gold:'#C9A84C',goldLt:'#F2E9D0',bg:'#F4F2ED',card:'#FFFFFF',
         border:'#E5E0D5',muted:'#6B6866',success:'#2D6A4F',warn:'#B5451B',info:'#1A3A5C',danger:'#8B1C1C'};
const SC={'Lead':'#9CA3AF','Mandate Signed':'#1A3A5C','Under Offer':'#B5451B',
          'Sold':'#2D6A4F','Registered':'#C9A84C','Paid':'#1C1C1E'};

// ── SAMPLE DATA ─────────────────────────────────────────────
const SD=[
  {id:1,addr:'12 Vineyard Estate Drive, Stellenbosch',seller:'Johan van der Berg',buyer:'Michael Thompson',sale:4500000,list:4750000,offer:'2026-01-15',reg:'2026-02-28',status:'Paid',who:'me',name:ME,comm:5,split:50,notes:'Smooth transaction.'},
  {id:2,addr:'7 De Waal Drive, Fresnaye, Cape Town',seller:'Susan Adams',buyer:'André Pretorius',sale:8200000,list:8500000,offer:'2026-02-03',reg:'2026-03-20',status:'Registered',who:'wife',name:WIFE,comm:4.5,split:50,notes:'Luxury sea-facing property.'},
  {id:3,addr:'34 Constantia Valley Road, Constantia',seller:'Peter Botha',buyer:'Sarah Johnson',sale:6800000,list:7200000,offer:'2026-03-10',reg:'',status:'Sold',who:'me',name:ME,comm:5,split:50,notes:'In transfer process.'},
  {id:4,addr:'22 Atlantic Boulevard, Sea Point',seller:'Elize Swart',buyer:'James Harrington',sale:3200000,list:3400000,offer:'2026-03-22',reg:'',status:'Under Offer',who:'wife',name:WIFE,comm:5,split:50,notes:''},
  {id:5,addr:'5 Bishopscourt Avenue, Bishopscourt',seller:'Mark Visser',buyer:'',sale:0,list:12500000,offer:'',reg:'',status:'Mandate Signed',who:'me',name:ME,comm:5,split:50,notes:'Ultra-luxury sole mandate.'},
  {id:6,addr:'18 Kloof Street, Gardens, Cape Town',seller:'Thabo Molefe',buyer:'Lisa van Wyk',sale:2100000,list:2250000,offer:'2026-01-08',reg:'2026-02-14',status:'Paid',who:'wife',name:WIFE,comm:5,split:50,notes:'First-time buyer.'},
  {id:7,addr:'9 Oranjezicht Crescent, Oranjezicht',seller:'David Nkosi',buyer:'Emma Fitzgerald',sale:3750000,list:3900000,offer:'2026-04-01',reg:'',status:'Sold',who:'me',name:ME,comm:5,split:50,notes:''},
  {id:8,addr:'45 Hout Bay Harbour Road, Hout Bay',seller:'Riana du Toit',buyer:'',sale:0,list:5800000,offer:'',reg:'',status:'Lead',who:'wife',name:WIFE,comm:5,split:50,notes:'Viewing scheduled next week.'},
  {id:9,addr:'3 Camps Bay Terrace, Camps Bay',seller:'Greg Patel',buyer:'Natasha Oberholzer',sale:9100000,list:9500000,offer:'2025-11-20',reg:'2026-01-10',status:'Paid',who:'me',name:ME,comm:5,split:50,notes:'Exceptional sea-view.'},
  {id:10,addr:'77 Newlands Avenue, Newlands',seller:'Caroline Smith',buyer:'Ryan de Beer',sale:4200000,list:4400000,offer:'2025-12-05',reg:'2026-01-28',status:'Paid',who:'wife',name:WIFE,comm:5,split:50,notes:''},
];
const SP=[
  {id:1,addr:'88 Camps Bay Drive, Camps Bay',src:'Referral',price:9500000,prob:75,close:'2026-06',follow:'2026-05-05',notes:'Owner motivated. Second viewing done.'},
  {id:2,addr:'3 Somerset Road, Green Point',src:'Website',price:2800000,prob:50,close:'2026-07',follow:'2026-05-10',notes:'Needs to sell existing home first.'},
  {id:3,addr:'15 Newlands Forest Drive, Newlands',src:'Previous Client',price:6200000,prob:85,close:'2026-05',follow:'2026-04-30',notes:'Verbal agreement. Drawing up mandate.'},
  {id:4,addr:'27 Sunset Beach Drive, Bloubergstrand',src:'Social Media',price:4100000,prob:30,close:'2026-08',follow:'2026-05-20',notes:'Early-stage enquiry.'},
  {id:5,addr:'61 Main Road, Claremont',src:'Cold Call',price:3300000,prob:60,close:'2026-06',follow:'2026-05-03',notes:'Considering selling for 6 months.'},
];
const TARGETS={mc:150000,yc:1800000,md:3,yd:36};

// ── UTILS ───────────────────────────────────────────────────
const R=n=>`R ${Number(n||0).toLocaleString('en-ZA',{minimumFractionDigits:0,maximumFractionDigits:0})}`;
const FD=s=>s?new Date(s).toLocaleDateString('en-ZA',{day:'2-digit',month:'short',year:'numeric'}):'—';
const FM=s=>{if(!s)return'—';const[y,m]=s.split('-');return new Date(y,m-1).toLocaleString('en',{month:'short',year:'2-digit'})};
function calc(d){
  const sp=Number(d.sale||0),cp=Number(d.comm||5),ap=Number(d.split||50);
  const tot=sp*(cp/100),ag=tot*(ap/100),agent=tot-ag;
  return{tot,ag,agent,me:d.who==='me'?agent:0,wife:d.who==='wife'?agent:0};
}

// ── ICONS ────────────────────────────────────────────────────
const ICONS={
  dashboard:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>,
  deals:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414A1 1 0 0119 9.414V19a2 2 0 01-2 2z"/></svg>,
  pipeline:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><path d="M3 6h18M3 12h18M3 18h18"/></svg>,
  calc:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><rect x="4" y="2" width="16" height="20" rx="2"/><path d="M8 6h8M8 11h2m4 0h2M8 16h2m4 0h2"/></svg>,
  income:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>,
  reports:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><path d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>,
  plus:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2"><path d="M12 4v16M4 12h16"/></svg>,
  edit:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>,
  trash:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg>,
  x:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2"><path d="M18 6L6 18M6 6l12 12"/></svg>,
  home:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>,
  menu:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>,
  search:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>,
  target:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>,
  trend:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>,
};
const I=({n,s=18})=><span style={{display:'inline-flex',alignItems:'center',width:s,height:s,flexShrink:0}}>{React.cloneElement(ICONS[n]||ICONS.home,{style:{width:s,height:s}})}</span>;

// ── SHARED UI ───────────────────────────────────────────────
const Card=({children,style={}})=>(
  <div style={{background:C.card,borderRadius:14,padding:22,boxShadow:'0 1px 4px rgba(0,0,0,0.07)',border:`1px solid ${C.border}`,...style}}>{children}</div>
);
const Stat=({label,val,sub,icon})=>(
  <Card style={{display:'flex',flexDirection:'column',gap:7}}>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
      <span style={{fontSize:10,color:C.muted,textTransform:'uppercase',letterSpacing:1.2,fontWeight:700}}>{label}</span>
      {icon&&<span style={{color:C.gold,opacity:.8}}><I n={icon} s={16}/></span>}
    </div>
    <div style={{fontSize:24,fontWeight:800,color:C.dark,letterSpacing:-.5,lineHeight:1}}>{val}</div>
    {sub&&<div style={{fontSize:11,color:C.muted}}>{sub}</div>}
  </Card>
);
const Badge=({status})=>(
  <span style={{display:'inline-block',padding:'3px 9px',borderRadius:20,fontSize:11,fontWeight:700,
    background:SC[status]+'1A',color:SC[status],border:`1px solid ${SC[status]}44`,whiteSpace:'nowrap'}}>{status}</span>
);
const Prog=({label,cur,tgt,fmt})=>{
  const p=Math.min((cur/tgt)*100,100);
  return(
    <div style={{marginBottom:16}}>
      <div style={{display:'flex',justifyContent:'space-between',marginBottom:5}}>
        <span style={{fontSize:13,fontWeight:600}}>{label}</span>
        <span style={{fontSize:12,color:C.muted}}>{fmt?fmt(cur):cur} / {fmt?fmt(tgt):tgt}</span>
      </div>
      <div style={{height:6,background:C.border,borderRadius:3,overflow:'hidden'}}>
        <div style={{height:'100%',width:`${p}%`,background:p>=100?C.success:C.gold,borderRadius:3,transition:'width .6s'}}/>
      </div>
      <div style={{fontSize:11,color:C.muted,marginTop:3}}>{p.toFixed(1)}% of target</div>
    </div>
  );
};
const Modal=({open,onClose,title,children,w=700})=>{
  if(!open)return null;
  return(
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.5)',zIndex:1000,display:'flex',alignItems:'center',justifyContent:'center',padding:14}} onClick={onClose}>
      <div style={{background:C.card,borderRadius:16,width:'100%',maxWidth:w,maxHeight:'92vh',overflowY:'auto',boxShadow:'0 24px 70px rgba(0,0,0,0.22)'}} onClick={e=>e.stopPropagation()}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'18px 24px',borderBottom:`1px solid ${C.border}`,position:'sticky',top:0,background:C.card,zIndex:2,borderRadius:'16px 16px 0 0'}}>
          <h2 style={{fontSize:16,fontWeight:800,color:C.dark}}>{title}</h2>
          <button onClick={onClose} style={{background:'none',border:'none',cursor:'pointer',color:C.muted,display:'flex',padding:4}}><I n="x" s={19}/></button>
        </div>
        <div style={{padding:24}}>{children}</div>
      </div>
    </div>
  );
};

// ── FORM HELPERS ─────────────────────────────────────────────
const L={fontSize:11,fontWeight:700,color:C.muted,textTransform:'uppercase',letterSpacing:.6,marginBottom:5,display:'block'};
const IN={width:'100%',padding:'10px 12px',border:`1px solid ${C.border}`,borderRadius:8,fontSize:14,color:C.dark,background:'#FAFAF8',outline:'none'};
const FLD={marginBottom:14};
const G2={display:'grid',gridTemplateColumns:'1fr 1fr',gap:14};

// ── DEAL FORM ────────────────────────────────────────────────
const ED={addr:'',seller:'',buyer:'',sale:'',list:'',offer:'',reg:'',status:'Lead',who:'me',name:ME,comm:5,split:50,notes:''};
function DealForm({deal,onSave,onClose}){
  const[f,sF]=useState(deal||ED);
  const set=(k,v)=>sF(p=>({...p,[k]:v}));
  const c=useMemo(()=>calc(f),[f]);
  return(
    <form onSubmit={e=>{e.preventDefault();onSave({...f,id:deal?.id||Date.now()});}}>
      <div style={FLD}><label style={L}>Property Address *</label>
        <input style={IN} value={f.addr} onChange={e=>set('addr',e.target.value)} required placeholder="12 Example Street, Suburb, City"/>
      </div>
      <div style={G2}>
        <div style={FLD}><label style={L}>Seller Name</label><input style={IN} value={f.seller} onChange={e=>set('seller',e.target.value)}/></div>
        <div style={FLD}><label style={L}>Buyer Name</label><input style={IN} value={f.buyer} onChange={e=>set('buyer',e.target.value)}/></div>
        <div style={FLD}><label style={L}>Listing Price (R)</label><input style={IN} type="number" value={f.list} onChange={e=>set('list',e.target.value)}/></div>
        <div style={FLD}><label style={L}>Sale Price (R)</label><input style={IN} type="number" value={f.sale} onChange={e=>set('sale',e.target.value)}/></div>
        <div style={FLD}><label style={L}>Date Offer Accepted</label><input style={IN} type="date" value={f.offer} onChange={e=>set('offer',e.target.value)}/></div>
        <div style={FLD}><label style={L}>Date Registered</label><input style={IN} type="date" value={f.reg} onChange={e=>set('reg',e.target.value)}/></div>
        <div style={FLD}><label style={L}>Status</label>
          <select style={IN} value={f.status} onChange={e=>set('status',e.target.value)}>
            {STATUSES.map(s=><option key={s}>{s}</option>)}
          </select>
        </div>
        <div style={FLD}><label style={L}>Assigned To</label>
          <select style={IN} value={f.who} onChange={e=>{set('who',e.target.value);set('name',e.target.value==='me'?ME:WIFE);}}>
            <option value="me">{ME}</option><option value="wife">{WIFE}</option>
          </select>
        </div>
        <div style={FLD}><label style={L}>Commission %</label><input style={IN} type="number" step=".1" min="0" max="20" value={f.comm} onChange={e=>set('comm',parseFloat(e.target.value)||0)}/></div>
        <div style={FLD}><label style={L}>Agency Split % (E&amp;V keeps)</label><input style={IN} type="number" step="1" min="0" max="100" value={f.split} onChange={e=>set('split',parseFloat(e.target.value)||0)}/></div>
      </div>
      {Number(f.sale)>0&&(
        <div style={{background:C.bg,borderRadius:10,padding:14,marginBottom:14,border:`1px solid ${C.border}`}}>
          <div style={{fontSize:10,fontWeight:800,textTransform:'uppercase',letterSpacing:1.2,color:C.gold,marginBottom:8}}>Live Commission Preview</div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:10}}>
            <div><div style={{fontSize:10,color:C.muted,marginBottom:2}}>Total Commission</div><div style={{fontWeight:800}}>{R(c.tot)}</div></div>
            <div><div style={{fontSize:10,color:C.muted,marginBottom:2}}>Agency (E&amp;V)</div><div style={{fontWeight:700,color:C.muted}}>{R(c.ag)}</div></div>
            <div><div style={{fontSize:10,color:C.muted,marginBottom:2}}>Your Gross</div><div style={{fontWeight:800,color:C.gold}}>{R(c.agent)}</div></div>
          </div>
          <div style={{fontSize:11,color:C.muted,marginTop:8}}>→ Allocated to <strong>{f.who==='me'?ME:WIFE}</strong></div>
        </div>
      )}
      <div style={FLD}><label style={L}>Notes</label><textarea style={{...IN,minHeight:72,resize:'vertical'}} value={f.notes} onChange={e=>set('notes',e.target.value)}/></div>
      <div style={{display:'flex',gap:10,justifyContent:'flex-end',paddingTop:6}}>
        <button type="button" onClick={onClose} style={{padding:'10px 20px',borderRadius:8,border:`1px solid ${C.border}`,background:'none',cursor:'pointer',fontWeight:700,fontSize:13}}>Cancel</button>
        <button type="submit" style={{padding:'10px 24px',borderRadius:8,border:'none',background:C.dark,color:'#fff',cursor:'pointer',fontWeight:800,fontSize:13}}>Save Deal</button>
      </div>
    </form>
  );
}

// ── DASHBOARD ────────────────────────────────────────────────
function Dashboard({deals,pipe}){
  const now=new Date();
  const mKey=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  const yKey=String(now.getFullYear());
  const sold=deals.filter(d=>['Sold','Registered','Paid'].includes(d.status)&&d.sale>0);
  const paid=deals.filter(d=>d.status==='Paid'&&d.sale>0);
  const pend=deals.filter(d=>['Sold','Registered'].includes(d.status)&&d.sale>0);
  const mo=sold.filter(d=>(d.offer||'').startsWith(mKey));
  const yr=sold.filter(d=>(d.offer||'').startsWith(yKey));
  const mComm=mo.reduce((s,d)=>s+calc(d).agent,0);
  const yComm=yr.reduce((s,d)=>s+calc(d).agent,0);
  const pComm=paid.reduce((s,d)=>s+calc(d).agent,0);
  const eComm=pend.reduce((s,d)=>s+calc(d).agent,0);
  const avg=sold.length>0?sold.reduce((s,d)=>s+d.sale,0)/sold.length:0;
  const bars=[];
  for(let i=5;i>=0;i--){
    const d=new Date(now.getFullYear(),now.getMonth()-i,1);
    const k=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    const m=d.toLocaleString('en',{month:'short'});
    const c=sold.filter(x=>(x.offer||'').startsWith(k)).reduce((s,x)=>s+calc(x).agent,0);
    bars.push({m,v:Math.round(c/1000)});
  }
  const pie=STATUSES.map(s=>({n:s,v:deals.filter(d=>d.status===s).length})).filter(x=>x.v>0);
  return(
    <div>
      <div style={{marginBottom:22}}>
        <h1 style={{fontSize:24,fontWeight:800,letterSpacing:-.5}}>Dashboard</h1>
        <p style={{color:C.muted,fontSize:13,marginTop:3}}>Welcome back, {ME}. Here's your overview.</p>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(185px,1fr))',gap:13,marginBottom:20}} className="g3">
        <Stat label="This Month Commission" val={R(mComm)} sub={`${mo.length} deal${mo.length!==1?'s':''}`} icon="trend"/>
        <Stat label="This Year Commission"  val={R(yComm)} sub={`${yr.length} deals`}   icon="target"/>
        <Stat label="Commission Paid"       val={R(pComm)} sub={`${paid.length} paid`}  icon="home"/>
        <Stat label="Commission Pending"    val={R(eComm)} sub={`${pend.length} deals`} icon="deals"/>
        <Stat label="Houses Sold"           val={sold.length} sub="all time"            icon="home"/>
        <Stat label="Avg Selling Price"     val={R(avg)}   sub="all sold deals"         icon="trend"/>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14,marginBottom:20}} className="g2">
        <Card><h3 style={{fontSize:13,fontWeight:800,marginBottom:16}}>Monthly Targets</h3>
          <Prog label="Commission" cur={mComm} tgt={TARGETS.mc} fmt={R}/>
          <Prog label="Deals" cur={mo.length} tgt={TARGETS.md}/>
        </Card>
        <Card><h3 style={{fontSize:13,fontWeight:800,marginBottom:16}}>Yearly Targets</h3>
          <Prog label="Commission" cur={yComm} tgt={TARGETS.yc} fmt={R}/>
          <Prog label="Deals" cur={yr.length} tgt={TARGETS.yd}/>
        </Card>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'2fr 1fr',gap:14}} className="g2">
        <Card>
          <h3 style={{fontSize:13,fontWeight:800,marginBottom:16}}>Commission Trend — 6 Months (R'000)</h3>
          <ResponsiveContainer width="100%" height={210}>
            <BarChart data={bars}><CartesianGrid strokeDasharray="3 3" stroke={C.border}/>
              <XAxis dataKey="m" tick={{fontSize:11,fill:C.muted}}/><YAxis tick={{fontSize:11,fill:C.muted}}/>
              <Tooltip formatter={v=>[`R ${v}k`,'Commission']} contentStyle={{borderRadius:8,border:`1px solid ${C.border}`,fontSize:12}}/>
              <Bar dataKey="v" fill={C.gold} radius={[5,5,0,0]}/>
            </BarChart>
          </ResponsiveContainer>
        </Card>
        <Card>
          <h3 style={{fontSize:13,fontWeight:800,marginBottom:12}}>Deals by Status</h3>
          <ResponsiveContainer width="100%" height={175}>

// ── COMMISSION CALCULATOR ────────────────────────────────────
function CommCalc(){

    <div style={{textAlign:'center',padding:'16px 12px',background:dark?C.dark:gold?C.goldLt:C.bg,borderRadius:10,border:`1px solid ${dark?'transparent':C.border}`}}>

    <div>
      <div style={{marginBottom:22}}>

        <Card>
          <h3 style={{fontWeight:800,marginBottom:20,fontSize:14}}>Deal Details</h3>
          <div style={FLD}><label style={L}>Sale Price (R)</label>

          </div>
          <div style={FLD}><label style={L}>Commission Rate: <strong style={{color:C.gold}}>{cp}%</strong></label>
            <input type="range" style={{width:'100%',accentColor:C.gold,marginBottom:3}} min="1" max="10" step=".5" value={cp} onChange={e=>sC(e.target.value)}/>
            <div style={{display:'flex',justifyContent:'space-between',fontSize:10,color:C.muted}}><span>1%</span><span>10%</span></div>
          </div>
          <div style={FLD}><label style={L}>E&amp;V keeps: <strong style={{color:C.gold}}>{as}%</strong> · You keep: <strong style={{color:C.gold}}>{pct}%</strong></label>
            <input type="range" style={{width:'100%',accentColor:C.gold,marginBottom:3}} min="0" max="100" step="5" value={as} onChange={e=>sA(e.target.value)}/>
            <div style={{display:'flex',justifyContent:'space-between',fontSize:10,color:C.muted}}><span>0%</span><span>100%</span></div>
          </div>

            <div style={{display:'flex',gap:10}}>
              {[['me',ME],['wife',WIFE]].map(([v,lbl])=>(
                <button key={v} type="button" onClick={()=>sW(v)} style={{flex:1,padding:'10px',borderRadius:8,fontWeight:800,fontSize:14,cursor:'pointer',
                  border:who===v?`2px solid ${C.gold}`:`1px solid ${C.border}`,
                  background:who===v?C.goldLt:'#fff',color:who===v?C.dark:C.muted}}>{lbl}</button>
              ))}
            </div>
          </div>
        </Card>
        <Card>
          <h3 style={{fontWeight:800,marginBottom:20,fontSize:14}}>Breakdown</h3>

        </Card>

  );

// ── INCOME REPORT ────────────────────────────────────────────

  const[yr,sY]=useState(new Date().getFullYear());

  const md=yd.filter(d=>d.who==='me'),wd=yd.filter(d=>d.who==='wife');
  const mi=md.reduce((s,d)=>s+calc(d).me,0),wi=wd.reduce((s,d)=>s+calc(d).wife,0),co=mi+wi;
  const moD=[];
  for(let m=1;m<=12;m++){

    const wc2=deals.filter(d=>d.who==='wife'&&(d.offer||'').startsWith(k)&&d.sale>0).reduce((s,d)=>s+calc(d).wife,0);

            <div key={d.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'9px 0',borderBottom:`1px solid ${C.border}`}}>
              <div><div style={{fontSize:13,fontWeight:700,maxWidth:190,lineHeight:1.3}}>{d.addr}</div>
                <div style={{fontSize:10,color:C.muted,marginTop:1}}>{FD(d.offer)}</div>

              <div style={{textAlign:'right',flexShrink:0,marginLeft:10}}>

        </div>
        <select value={yr} onChange={e=>sY(Number(e.target.value))} style={{...IN,width:'auto',fontSize:13}}>
          {[2024,2025,2026,2027].map(y=><option key={y}>{y}</option>)}
        </select>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(185px,1fr))',gap:13,marginBottom:20}} className="g3">
        <Stat label={`${ME}'s Income`}  val={R(mi)} sub={`${md.length} deals`} icon="income"/>
        <Stat label={`${WIFE}'s Income`} val={R(wi)} sub={`${wd.length} deals`} icon="income"/>
        <Stat label="Combined Household" val={R(co)} sub={`${yd.length} total`} icon="trend"/>
        <Stat label="Split Ratio" val={co>0?`${Math.round(mi/co*100)}/${Math.round(wi/co*100)}`:'N/A'} sub={`${ME} / ${WIFE}`} icon="target"/>
      </div>
      <Card style={{marginBottom:20}}>
        <h3 style={{fontSize:13,fontWeight:800,marginBottom:16}}>Monthly Comparison — R'000</h3>
        <ResponsiveContainer width="100%" height={250}>
          <BarChart data={moD}><CartesianGrid strokeDasharray="3 3" stroke={C.border}/>
            <XAxis dataKey="m" tick={{fontSize:11,fill:C.muted}}/><YAxis tick={{fontSize:11,fill:C.muted}}/>
            <Tooltip formatter={(v,n)=>[`R ${v}k`,n]} contentStyle={{borderRadius:8,border:`1px solid ${C.border}`,fontSize:11}}/>
            <Legend/><Bar dataKey={ME} fill={C.dark} radius={[4,4,0,0]}/><Bar dataKey={WIFE} fill={C.gold} radius={[4,4,0,0]}/>
          </BarChart>
        </ResponsiveContainer>
      </Card>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:20}} className="g2">
        <Col nm={ME}   ag="me"   ds={md} inc={mi}/>
        <Col nm={WIFE} ag="wife" ds={wd} inc={wi}/>
      </div>
    </div>
  );
}

// ── REPORTS ──────────────────────────────────────────────────
function Reports({deals,pipe}){
  const[tab,sT]=useState('monthly');
  const sold=deals.filter(d=>['Sold','Registered','Paid'].includes(d.status)&&d.sale>0);
  const paid=deals.filter(d=>d.status==='Paid'&&d.sale>0);
  const pend=deals.filter(d=>['Sold','Registered'].includes(d.status)&&d.sale>0);
  const tC=sold.reduce((s,d)=>s+calc(d).agent,0);
  const pC=paid.reduce((s,d)=>s+calc(d).agent,0);
  const eC=pend.reduce((s,d)=>s+calc(d).agent,0);
  const avg=sold.length>0?tC/sold.length:0;
  const pw=pipe.reduce((s,p)=>s+Number(p.price||0)*p.prob/100,0);
  const now=new Date();
  const mo12=[];
  for(let i=11;i>=0;i--){
    const d=new Date(now.getFullYear(),now.getMonth()-i,1);
    const k=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    const ml=d.toLocaleString('en',{month:'short',year:'2-digit'});
    const c=sold.filter(x=>(x.offer||'').startsWith(k)).reduce((s,x)=>s+calc(x).agent,0);
    mo12.push({ml,v:Math.round(c/1000)});
  }
  const aM={};
  sold.forEach(d=>{const pts=d.addr.split(',');const a=pts.length>1?pts[pts.length-2].trim():pts[0].trim();if(!aM[a])aM[a]={n:0,c:0};aM[a].n++;aM[a].c+=calc(d).agent;});
  const aD=Object.entries(aM).map(([a,v])=>({a,n:v.n,c:Math.round(v.c/1000)})).sort((x,y)=>y.c-x.c);
  const TABS=[{k:'monthly',l:'Monthly'},{k:'pipeline',l:'Pipeline'},{k:'area',l:'By Area'},{k:'summary',l:'Summary'}];
  const TH=({t})=><th style={{padding:'10px 13px',textAlign:'left',fontWeight:700,fontSize:10,textTransform:'uppercase',letterSpacing:.8,color:C.muted,borderBottom:`1px solid ${C.border}`,whiteSpace:'nowrap',background:C.bg}}>{t}</th>;
  return(
    <div>
      <div style={{marginBottom:20}}><h1 style={{fontSize:24,fontWeight:800,letterSpacing:-.5}}>Reports</h1>
        <p style={{color:C.muted,fontSize:13,marginTop:3}}>In-depth performance analysis.</p>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(170px,1fr))',gap:13,marginBottom:24}} className="g3">
        <Stat label="Total Commission"    val={R(tC)} sub="all sold"       icon="trend"/>
        <Stat label="Commission Paid"     val={R(pC)} sub={`${paid.length} paid`} icon="home"/>
        <Stat label="Pending"             val={R(eC)} sub={`${pend.length} deals`} icon="deals"/>
        <Stat label="Avg per Sale"        val={R(avg)} sub="per deal"      icon="calc"/>
        <Stat label="Pipeline (weighted)" val={R(pw)} sub="by probability" icon="pipeline"/>
        <Stat label="Total Sold"          val={sold.length} sub="all time" icon="target"/>
      </div>
      <div style={{display:'flex',gap:3,marginBottom:18,background:C.bg,padding:3,borderRadius:9,border:`1px solid ${C.border}`,width:'fit-content',flexWrap:'wrap'}}>
        {TABS.map(t=>(
          <button key={t.k} onClick={()=>sT(t.k)} style={{padding:'8px 16px',borderRadius:7,border:'none',cursor:'pointer',fontWeight:700,fontSize:13,
            background:tab===t.k?C.dark:'transparent',color:tab===t.k?'#fff':C.muted}}>{t.l}</button>
        ))}
      </div>
      {tab==='monthly'&&(
        <Card><h3 style={{fontWeight:800,marginBottom:18,fontSize:14}}>Monthly Commission — 12 Months (R'000)</h3>
          <ResponsiveContainer width="100%" height={290}>
            <BarChart data={mo12}><CartesianGrid strokeDasharray="3 3" stroke={C.border}/>
              <XAxis dataKey="ml" tick={{fontSize:11,fill:C.muted}}/><YAxis tick={{fontSize:11,fill:C.muted}}/>
              <Tooltip formatter={v=>[`R ${v}k`,'Commission']} contentStyle={{borderRadius:8,border:`1px solid ${C.border}`,fontSize:11}}/>
              <Bar dataKey="v" fill={C.gold} radius={[5,5,0,0]}/>
            </BarChart>
          </ResponsiveContainer>
        </Card>
      )}
      {tab==='pipeline'&&(
        <Card><h3 style={{fontWeight:800,marginBottom:18,fontSize:14}}>Pipeline Detail</h3>
          <div style={{overflowX:'auto'}}>
            <table style={{width:'100%',borderCollapse:'collapse',fontSize:13}}>
              <thead><tr><TH t="Property"/><TH t="Source"/><TH t="Est. Price"/><TH t="Est. Comm"/><TH t="Probability"/><TH t="Weighted Value"/><TH t="Close"/></tr></thead>
              <tbody>
                {pipe.map((p,i)=>{
                  const ec2=Number(p.price)*0.05*0.5,wv=Number(p.price)*p.prob/100;
                  return(
                    <tr key={p.id} style={{borderBottom:`1px solid ${C.border}`,background:i%2===0?'#fff':'#FAFAF8'}}>
                      <td style={{padding:'11px 13px',fontWeight:700,maxWidth:200}}>{p.addr}</td>
                      <td style={{padding:'11px 13px',color:C.muted}}>{p.src}</td>
                      <td style={{padding:'11px 13px',fontWeight:700}}>{R(p.price)}</td>
                      <td style={{padding:'11px 13px',color:C.gold,fontWeight:800}}>{R(ec2)}</td>
                      <td style={{padding:'11px 13px',fontWeight:700}}>{p.prob}%</td>
                      <td style={{padding:'11px 13px',fontWeight:700}}>{R(wv)}</td>
                      <td style={{padding:'11px 13px',color:C.muted,whiteSpace:'nowrap'}}>{FM(p.close)}</td>
                    </tr>
                  );
                })}
                <tr style={{background:C.goldLt,fontWeight:800}}>
                  <td colSpan={5} style={{padding:'11px 13px',textAlign:'right'}}>Weighted Total:</td>
                  <td style={{padding:'11px 13px'}}>{R(pw)}</td><td/>
                </tr>
              </tbody>
            </table>
          </div>
        </Card>
      )}
      {tab==='area'&&(
        <Card><h3 style={{fontWeight:800,marginBottom:18,fontSize:14}}>Sales by Area (R'000)</h3>
          {aD.length>0?<>
            <ResponsiveContainer width="100%" height={250}>
              <BarChart data={aD} layout="vertical"><CartesianGrid strokeDasharray="3 3" stroke={C.border}/>
                <XAxis type="number" tick={{fontSize:11,fill:C.muted}}/><YAxis type="category" dataKey="a" tick={{fontSize:11,fill:C.muted}} width={125}/>
                <Tooltip formatter={v=>[`R ${v}k`,'Commission']} contentStyle={{borderRadius:8,border:`1px solid ${C.border}`,fontSize:11}}/>
                <Bar dataKey="c" fill={C.dark} radius={[0,5,5,0]}/>
              </BarChart>
            </ResponsiveContainer>
            <table style={{width:'100%',borderCollapse:'collapse',fontSize:13,marginTop:18}}>
              <thead><tr><TH t="Area"/><TH t="Deals"/><TH t="Commission"/></tr></thead>
              <tbody>{aD.map((a,i)=>(
                <tr key={a.a} style={{borderBottom:`1px solid ${C.border}`,background:i%2===0?'#fff':'#FAFAF8'}}>
                  <td style={{padding:'10px 13px',fontWeight:700}}>{a.a}</td>
                  <td style={{padding:'10px 13px'}}>{a.n}</td>
                  <td style={{padding:'10px 13px',color:C.gold,fontWeight:800}}>R {a.c}k</td>
                </tr>
              ))}</tbody>
            </table>
          </>:<p style={{color:C.muted}}>No sold deals yet.</p>}
        </Card>
      )}
      {tab==='summary'&&(
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:18}} className="g2">
          <Card><h3 style={{fontWeight:800,marginBottom:16,fontSize:14}}>Commission Summary</h3>
            {[['Total Earned',R(tC)],['Paid',R(pC)],['Pending',R(eC)],['Avg per Sale',R(avg)],['Pipeline (weighted)',R(pw)]].map(([l,v])=>(
              <div key={l} style={{display:'flex',justifyContent:'space-between',padding:'10px 0',borderBottom:`1px solid ${C.border}`}}>
                <span style={{color:C.muted,fontSize:13}}>{l}</span><span style={{fontWeight:800,fontSize:13}}>{v}</span>
              </div>
            ))}
          </Card>
          <Card><h3 style={{fontWeight:800,marginBottom:16,fontSize:14}}>Deals by Status</h3>
            {STATUSES.map(s=>{
              const cnt=deals.filter(d=>d.status===s).length;
              return(
                <div key={s} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 0',borderBottom:`1px solid ${C.border}`}}>
                  <Badge status={s}/><span style={{fontWeight:800,fontSize:15}}>{cnt}</span>
                </div>
              );
            })}
          </Card>
        </div>
      )}
    </div>
  );
}

// ── APP SHELL ────────────────────────────────────────────────
const NAV=[
  {id:'dashboard',l:'Dashboard',   i:'dashboard'},
  {id:'deals',    l:'Deals & Sales',i:'deals'},
  {id:'pipeline', l:'Pipeline',    i:'pipeline'},
  {id:'calc',     l:'Comm. Calc',  i:'calc'},
  {id:'income',   l:'Income Report',i:'income'},
  {id:'reports',  l:'Reports',     i:'reports'},
];
function App(){
  const[pg,sPg]=useState('dashboard');
  const[deals,sD]=useState(SD);
  const[pipe,sP]=useState(SP);
  const[nav,sN]=useState(false);
  const addD=d=>sD(p=>[{...d,id:Date.now()},...p]);
  const editD=d=>sD(p=>p.map(x=>x.id===d.id?d:x));
  const delD=id=>sD(p=>p.filter(x=>x.id!==id));
  const addP=x=>sP(p=>[{...x,id:Date.now()},...p]);
  const editP=x=>sP(p=>p.map(y=>y.id===x.id?x:y));
  const delP=id=>sP(p=>p.filter(x=>x.id!==id));
  const go=id=>{sPg(id);sN(false);};
  const render=()=>{switch(pg){
    case'dashboard':return<Dashboard deals={deals} pipe={pipe}/>;
    case'deals':    return<Deals deals={deals} onAdd={addD} onEdit={editD} onDel={delD}/>;
    case'pipeline': return<Pipeline pipe={pipe} onAdd={addP} onEdit={editP} onDel={delP}/>;
    case'calc':     return<CommCalc/>;
    case'income':   return<Income deals={deals}/>;
    case'reports':  return<Reports deals={deals} pipe={pipe}/>;
    default:        return<Dashboard deals={deals} pipe={pipe}/>;
  }};
  const W=230;
  return(
    <div style={{display:'flex',minHeight:'100vh',background:C.bg}}>
      {nav&&<div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.45)',zIndex:98}} onClick={()=>sN(false)}/>}
      {/* SIDEBAR */}
      <aside className={`sidebar${nav?' open':''}`} style={{width:W,background:C.dark,color:'#fff',display:'flex',flexDirection:'column',position:'fixed',top:0,left:0,height:'100vh',zIndex:99,transition:'transform .25s'}}>
        <div style={{padding:'24px 20px 18px',borderBottom:'1px solid rgba(255,255,255,0.1)'}}>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <div style={{width:32,height:32,background:C.gold,borderRadius:8,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}><I n="home" s={17}/></div>
            <div><div style={{fontSize:15,fontWeight:900,letterSpacing:1.5,color:'#fff',lineHeight:1}}>AgentOS</div>
              <div style={{fontSize:9,color:C.gold,letterSpacing:2,textTransform:'uppercase',marginTop:1}}>Real Estate</div>
            </div>
          </div>
        </div>
        <nav style={{flex:1,padding:'12px 9px',overflowY:'auto'}}>
          {NAV.map(item=>{
            const act=pg===item.id;
            return(
              <button key={item.id} onClick={()=>go(item.id)} style={{display:'flex',alignItems:'center',gap:10,width:'100%',padding:'11px 12px',marginBottom:2,borderRadius:8,border:'none',cursor:'pointer',textAlign:'left',
                background:act?C.gold:'transparent',color:act?C.dark:'rgba(255,255,255,0.65)',fontWeight:act?800:500,fontSize:13.5,transition:'all .15s'}}>
                <span style={{color:act?C.dark:'rgba(255,255,255,0.5)',display:'flex'}}><I n={item.i} s={17}/></span>{item.l}
              </button>
            );
          })}
        </nav>
        <div style={{padding:'14px 18px',borderTop:'1px solid rgba(255,255,255,0.1)'}}>
          <div style={{fontSize:13,fontWeight:800,color:'#fff'}}>{ME} &amp; {WIFE}</div>
          <div style={{fontSize:10,color:'rgba(255,255,255,0.4)',marginTop:1,letterSpacing:.5}}>Engel &amp; Völkers · Cape Town</div>
        </div>
      </aside>
      {/* MAIN */}
      <div className="main-wrap" style={{flex:1,marginLeft:W,display:'flex',flexDirection:'column',minHeight:'100vh'}}>
        <header className="mob-hdr" style={{display:'none',background:C.dark,padding:'13px 15px',alignItems:'center',justifyContent:'space-between',position:'sticky',top:0,zIndex:50}}>
          <button onClick={()=>sN(true)} style={{background:'none',border:'none',cursor:'pointer',color:'#fff',display:'flex',padding:4}}><I n="menu" s={21}/></button>
          <div style={{fontSize:14,fontWeight:900,color:'#fff',letterSpacing:1.5}}>AgentOS</div>
          <div style={{width:28}}/>
        </header>
        <main className="page-pad" style={{flex:1,padding:'30px 28px'}}>{render()}</main>
        <footer style={{textAlign:'center',padding:'14px',fontSize:11,color:C.muted,borderTop:`1px solid ${C.border}`}}>
          AgentOS · {ME} &amp; {WIFE} · Engel &amp; Völkers
        </footer>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
